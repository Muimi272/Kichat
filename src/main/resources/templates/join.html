<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kichat - Join</title>
    <script>
        (function () {
            const savedTheme = localStorage.getItem("kichatTheme");
            const theme = savedTheme === "light" || savedTheme === "dark"
                ? savedTheme
                : (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
            document.documentElement.setAttribute("data-theme", theme);
        })();
    </script>
    <style>
        :root {
            color-scheme: light;
            --bg-1: #f4f7fb;
            --bg-2: #e7f0ff;
            --panel: rgba(255, 255, 255, 0.82);
            --panel-border: rgba(255, 255, 255, 0.7);
            --text: #172033;
            --muted: #60708f;
            --primary: #2563eb;
            --primary-strong: #1d4ed8;
            --primary-soft: rgba(37, 99, 235, 0.12);
            --danger: #d92d20;
            --danger-soft: rgba(217, 45, 32, 0.1);
            --success: #039855;
            --success-soft: rgba(3, 152, 85, 0.12);
            --shadow: 0 30px 80px rgba(37, 65, 120, 0.18);
            --surface: rgba(255, 255, 255, 0.88);
            --surface-border: rgba(23, 32, 51, 0.08);
            --label: #334155;
            --counter: #94a3b8;
            --button-secondary-bg: rgba(255, 255, 255, 0.78);
            --button-secondary-border: rgba(148, 163, 184, 0.24);
        }

        html[data-theme="dark"] {
            color-scheme: dark;
            --bg-1: #08111f;
            --bg-2: #101b31;
            --panel: rgba(8, 14, 25, 0.84);
            --panel-border: rgba(148, 163, 184, 0.16);
            --text: #e5eefc;
            --muted: #98adcb;
            --primary-soft: rgba(59, 130, 246, 0.18);
            --danger-soft: rgba(217, 45, 32, 0.16);
            --success-soft: rgba(3, 152, 85, 0.16);
            --shadow: 0 30px 80px rgba(0, 0, 0, 0.42);
            --surface: rgba(15, 23, 42, 0.9);
            --surface-border: rgba(148, 163, 184, 0.16);
            --label: #d3dff3;
            --counter: #7f93b2;
            --button-secondary-bg: rgba(15, 23, 42, 0.88);
            --button-secondary-border: rgba(148, 163, 184, 0.18);
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            padding: 24px;
            display: grid;
            place-items: center;
            font-family: "Space Grotesk", "Aptos", "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(37, 99, 235, 0.18), transparent 32%),
                radial-gradient(circle at 85% 15%, rgba(56, 189, 248, 0.2), transparent 26%),
                linear-gradient(160deg, var(--bg-1), var(--bg-2));
            overflow: hidden;
            position: relative;
            user-select: none;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            border-radius: 999px;
            filter: blur(8px);
            pointer-events: none;
        }

        body::before {
            width: 320px;
            height: 320px;
            right: -120px;
            bottom: -120px;
            background: rgba(37, 99, 235, 0.12);
        }

        body::after {
            width: 240px;
            height: 240px;
            left: -80px;
            top: 12%;
            background: rgba(56, 189, 248, 0.16);
        }

        .shell {
            width: 100%;
            max-width: 430px;
        }

        .card {
            position: relative;
            z-index: 1;
            border: 1px solid var(--panel-border);
            background: var(--panel);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: var(--shadow);
        }

        .card {
            border-radius: 28px;
            padding: 32px;
            width: 100%;
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: start;
            gap: 16px;
            margin-bottom: 28px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 0;
        }

        .brand-mark {
            width: 52px;
            height: 52px;
            border-radius: 18px;
            display: grid;
            place-items: center;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 0.05em;
            color: #fff;
            background: linear-gradient(135deg, var(--primary-strong), #38bdf8);
            box-shadow: 0 18px 36px rgba(37, 99, 235, 0.24);
        }

        .brand-text strong {
            display: block;
            font-size: 24px;
            letter-spacing: -0.03em;
        }

        .brand-text span {
            display: block;
            margin-top: 4px;
            font-size: 13px;
            color: var(--muted);
        }

        .card-head {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: center;
            margin-bottom: 24px;
        }

        .card-head h2 {
            margin: 0;
            font-size: 18px;
            letter-spacing: -0.03em;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            background: var(--surface);
            border: 1px solid var(--surface-border);
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
            white-space: nowrap;
        }

        .status-pill::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #f79009;
            box-shadow: 0 0 0 5px rgba(247, 144, 9, 0.12);
        }

        .status-pill[data-tone="success"]::before {
            background: var(--success);
            box-shadow: 0 0 0 5px rgba(3, 152, 85, 0.12);
        }

        .status-pill[data-tone="error"]::before {
            background: var(--danger);
            box-shadow: 0 0 0 5px rgba(217, 45, 32, 0.1);
        }

        .status-pill[data-tone="busy"]::before {
            background: var(--primary);
            box-shadow: 0 0 0 5px rgba(37, 99, 235, 0.12);
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .field-label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .field label {
            font-size: 13px;
            font-weight: 700;
            color: var(--label);
        }

        .counter {
            font-size: 12px;
            font-weight: 700;
            color: var(--counter);
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap::before {
            content: "@";
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-weight: 700;
            font-size: 18px;
            color: #94a3b8;
            pointer-events: none;
        }

        input {
            width: 100%;
            padding: 16px 18px 16px 42px;
            border-radius: 18px;
            border: 1px solid rgba(148, 163, 184, 0.28);
            background: var(--surface);
            font: inherit;
            font-size: 15px;
            color: var(--text);
            transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
            user-select: text;
        }

        input::placeholder {
            color: #94a3b8;
        }

        input:hover {
            border-color: rgba(37, 99, 235, 0.24);
        }

        input:focus {
            outline: none;
            border-color: rgba(37, 99, 235, 0.55);
            box-shadow: 0 0 0 5px rgba(37, 99, 235, 0.12);
            transform: translateY(-1px);
        }

        .cta-row {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            min-height: 54px;
            border: none;
            border-radius: 18px;
            font: inherit;
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            background: linear-gradient(135deg, var(--primary), #3b82f6);
            box-shadow: 0 20px 35px rgba(37, 99, 235, 0.24);
            transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease, filter 0.18s ease;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 24px 42px rgba(37, 99, 235, 0.28);
            filter: saturate(1.05);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.55;
            box-shadow: none;
        }

        .theme-toggle {
            flex: 0 0 auto;
            min-height: 42px;
            padding: 0 14px;
            border-radius: 14px;
            background: var(--button-secondary-bg);
            border: 1px solid var(--button-secondary-border);
            color: var(--text);
            font-size: 13px;
            box-shadow: none;
        }

        .theme-toggle:hover:not(:disabled) {
            background: rgba(37, 99, 235, 0.1);
            border-color: rgba(37, 99, 235, 0.18);
            box-shadow: none;
        }

        .status-card,
        .error-card {
            margin-top: 16px;
            padding: 14px 16px;
            border-radius: 18px;
            font-size: 13px;
            line-height: 1.6;
            min-height: 52px;
            display: flex;
            align-items: center;
        }

        .status-card {
            background: var(--primary-soft);
            color: #1d4ed8;
            border: 1px solid rgba(37, 99, 235, 0.12);
        }

        .error-card {
            background: var(--danger-soft);
            color: var(--danger);
            border: 1px solid rgba(217, 45, 32, 0.12);
        }

        .error-card:empty {
            display: none;
        }

        @media (max-width: 520px) {
            body {
                padding: 16px;
            }

            .card {
                border-radius: 24px;
                padding: 22px;
            }

            .card-top {
                flex-direction: column;
                align-items: stretch;
            }

            .card-head {
                flex-direction: column;
                align-items: start;
            }

            .cta-row {
                margin-top: 20px;
            }
        }
    </style>
</head>
<body>
<main class="shell">
    <section class="card">
        <div class="card-top">
            <div class="brand">
                <div class="brand-mark">KI</div>
                <div class="brand-text">
                    <strong>Kichat</strong>
                    <span>Join the room</span>
                </div>
            </div>
            <button id="themeToggle" class="theme-toggle" type="button">Dark mode</button>
        </div>

        <div class="card-head">
            <h2>Username</h2>
            <div id="connectionPill" class="status-pill" data-tone="busy">Connecting</div>
        </div>

        <div class="field">
            <div class="field-label-row">
                <label for="username">Username</label>
                <span id="usernameCounter" class="counter">0 / 30</span>
            </div>
            <div class="input-wrap">
                <input id="username" type="text" maxlength="30" autocomplete="nickname" placeholder="Choose a display name">
            </div>
        </div>

        <div class="cta-row">
            <button id="joinBtn" type="button" disabled>Join Room</button>
        </div>

        <div id="status" class="status-card">Connecting to chat server...</div>
        <div id="error" class="error-card"></div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
<script>
    let stompClient = null;
    let pendingUsername = "";
    let joinTimeoutHandle = null;
    let isConnected = false;
    let isJoining = false;

    const usernameInput = document.getElementById("username");
    const joinBtn = document.getElementById("joinBtn");
    const statusEl = document.getElementById("status");
    const errorEl = document.getElementById("error");
    const usernameCounterEl = document.getElementById("usernameCounter");
    const connectionPillEl = document.getElementById("connectionPill");
    const themeToggleEl = document.getElementById("themeToggle");

    function getCurrentTheme() {
        return document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light";
    }

    function updateThemeToggle() {
        const currentTheme = getCurrentTheme();
        themeToggleEl.textContent = currentTheme === "dark" ? "Light mode" : "Dark mode";
        themeToggleEl.setAttribute("aria-label", currentTheme === "dark" ? "Switch to light mode" : "Switch to dark mode");
    }

    function applyTheme(theme) {
        document.documentElement.setAttribute("data-theme", theme);
        localStorage.setItem("kichatTheme", theme);
        updateThemeToggle();
    }

    function updateJoinButton() {
        const hasUsername = usernameInput.value.trim().length > 0;
        joinBtn.disabled = !isConnected || isJoining || !hasUsername;
        if (isJoining) {
            joinBtn.textContent = "Joining...";
            return;
        }
        joinBtn.textContent = isConnected ? "Join Room" : "Waiting for Server";
    }

    function updateUsernameUi() {
        usernameCounterEl.textContent = usernameInput.value.length + " / 30";
        updateJoinButton();
    }

    function setConnectionPill(text, tone) {
        connectionPillEl.textContent = text;
        connectionPillEl.dataset.tone = tone;
    }

    function setStatus(text, tone) {
        statusEl.textContent = text;
        statusEl.style.background = tone === "success"
            ? "var(--success-soft)"
            : tone === "error"
                ? "var(--danger-soft)"
                : "var(--primary-soft)";
        statusEl.style.color = tone === "success"
            ? "var(--success)"
            : tone === "error"
                ? "var(--danger)"
                : "var(--primary-strong)";
        statusEl.style.borderColor = tone === "success"
            ? "rgba(3, 152, 85, 0.12)"
            : tone === "error"
                ? "rgba(217, 45, 32, 0.12)"
                : "rgba(37, 99, 235, 0.12)";
    }

    function setError(text) {
        errorEl.textContent = text;
    }

    function getWebSocketUrl() {
        const wsProtocol = window.location.protocol === "https:" ? "wss" : "ws";
        return wsProtocol + "://" + window.location.host + "/ws-chat";
    }

    function connect() {
        stompClient = new StompJs.Client({
            brokerURL: getWebSocketUrl(),
            reconnectDelay: 0,
            debug: function () {}
        });

        stompClient.onConnect = function () {
            isConnected = true;
            setConnectionPill("Connected", "success");

            stompClient.subscribe("/topic/public", function (frame) {
                const message = JSON.parse(frame.body);
                if (message.type === "JOIN" && message.sender === pendingUsername) {
                    if (joinTimeoutHandle) {
                        clearTimeout(joinTimeoutHandle);
                        joinTimeoutHandle = null;
                    }
                    sessionStorage.setItem("kichatUsername", pendingUsername);
                    stompClient.deactivate();
                    window.location.href = "/room";
                }
            });

            stompClient.subscribe("/user/queue/error", function (frame) {
                const message = JSON.parse(frame.body);
                if (joinTimeoutHandle) {
                    clearTimeout(joinTimeoutHandle);
                    joinTimeoutHandle = null;
                }
                isJoining = false;
                setError(message.content || "Join failed.");
                setStatus("Connected. Please try another username.", "error");
                updateJoinButton();
            });

            setStatus("Connected. Enter a username to join.", "success");
            usernameInput.focus();
            updateJoinButton();
        };

        stompClient.onWebSocketError = function () {
            isConnected = false;
            isJoining = false;
            setConnectionPill("Offline", "error");
            setStatus("Failed to connect. Refresh and retry.", "error");
            setError("WebSocket connection failed.");
            updateJoinButton();
        };

        stompClient.onStompError = function () {
            isConnected = false;
            isJoining = false;
            setConnectionPill("Error", "error");
            setStatus("Connection error. Refresh and retry.", "error");
            setError("STOMP error.");
            updateJoinButton();
        };

        stompClient.activate();
    }

    function sendJoin() {
        if (!stompClient || !stompClient.connected) {
            setError("Not connected to server.");
            return;
        }

        const username = usernameInput.value.trim();
        if (!username) {
            setError("Username cannot be empty.");
            updateJoinButton();
            return;
        }

        pendingUsername = username;
        isJoining = true;
        setError("");
        setConnectionPill("Joining", "busy");
        setStatus("Joining...", "busy");
        updateJoinButton();

        if (joinTimeoutHandle) {
            clearTimeout(joinTimeoutHandle);
        }
        joinTimeoutHandle = setTimeout(function () {
            isJoining = false;
            setConnectionPill("Connected", "success");
            setStatus("Join response timeout. Please retry.", "error");
            setError("No response received. Try a different username.");
            updateJoinButton();
        }, 6000);

        stompClient.publish({
            destination: "/Kichat/join",
            body: JSON.stringify({
                type: "JOIN",
                sender: username
            })
        });
    }

    joinBtn.addEventListener("click", sendJoin);
    themeToggleEl.addEventListener("click", function () {
        applyTheme(getCurrentTheme() === "dark" ? "light" : "dark");
    });
    usernameInput.addEventListener("input", updateUsernameUi);
    usernameInput.addEventListener("keydown", function (event) {
        if (event.key === "Enter" && !joinBtn.disabled) {
            sendJoin();
        }
    });

    updateThemeToggle();
    updateUsernameUi();
    connect();
</script>
</body>
</html>
