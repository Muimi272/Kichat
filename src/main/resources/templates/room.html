<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kichat - Join</title>
    <script>
        (function () {
            const savedTheme = localStorage.getItem("kichatTheme");
            const theme = savedTheme === "light" || savedTheme === "dark"
                ? savedTheme
                : (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
            document.documentElement.setAttribute("data-theme", theme);
        })();
    </script>
    <style>
        :root {
            color-scheme: light;
            --bg-1: #edf3ff;
            --bg-2: #f8fbff;
            --panel: rgba(255, 255, 255, 0.84);
            --panel-border: rgba(255, 255, 255, 0.72);
            --surface: rgba(255, 255, 255, 0.92);
            --surface-strong: rgba(255, 255, 255, 0.97);
            --surface-soft: rgba(255, 255, 255, 0.76);
            --surface-border: rgba(148, 163, 184, 0.2);
            --surface-border-strong: rgba(255, 255, 255, 0.2);
            --text: #122033;
            --text-strong: #0f172a;
            --text-soft: #64748b;
            --text-faint: #94a3b8;
            --primary: #2563eb;
            --primary-strong: #1d4ed8;
            --primary-soft: rgba(37, 99, 235, 0.12);
            --accent-soft: rgba(56, 189, 248, 0.12);
            --success: #039855;
            --success-soft: rgba(3, 152, 85, 0.12);
            --danger: #d92d20;
            --danger-soft: rgba(217, 45, 32, 0.1);
            --warning: #f79009;
            --line: rgba(148, 163, 184, 0.22);
            --shadow: 0 30px 80px rgba(37, 65, 120, 0.18);
            --notice-badge-bg: rgba(255, 255, 255, 0.58);
            --button-soft-bg: rgba(255, 255, 255, 0.86);
            --button-soft-text: #334155;
            --tag-neutral-bg: rgba(15, 23, 42, 0.06);
            --tag-neutral-text: #475569;
            --username-prefix-color: #7f8faa;
            --motion-snap: 180ms;
            --motion-fast: 260ms;
            --motion-normal: 340ms;
            --motion-slow: 460ms;
            --ease-out-soft: cubic-bezier(0.22, 1, 0.36, 1);
            --ease-out-sharp: cubic-bezier(0.16, 1, 0.3, 1);
        }

        html[data-theme="dark"] {
            color-scheme: dark;
            --bg-1: #08111f;
            --bg-2: #0f1b31;
            --panel: rgba(8, 14, 25, 0.84);
            --panel-border: rgba(148, 163, 184, 0.14);
            --surface: rgba(10, 29, 68, 0.92);
            --surface-strong: rgba(8, 22, 52, 0.98);
            --surface-soft: rgba(8, 21, 49, 0.84);
            --surface-border: rgba(148, 163, 184, 0.14);
            --surface-border-strong: rgba(148, 163, 184, 0.18);
            --text: #e5eefc;
            --text-strong: #f8fbff;
            --text-soft: #a4b6d4;
            --text-faint: #7f93b2;
            --primary-soft: rgba(59, 130, 246, 0.18);
            --accent-soft: rgba(56, 189, 248, 0.18);
            --success-soft: rgba(3, 152, 85, 0.16);
            --danger-soft: rgba(217, 45, 32, 0.16);
            --line: rgba(148, 163, 184, 0.18);
            --shadow: 0 30px 80px rgba(0, 0, 0, 0.46);
            --notice-badge-bg: rgba(148, 163, 184, 0.14);
            --button-soft-bg: rgba(9, 25, 58, 0.92);
            --button-soft-text: #e5eefc;
            --tag-neutral-bg: rgba(37, 99, 235, 0.18);
            --tag-neutral-text: #c3d1e8;
            --username-prefix-color: #9ab2d9;
        }

        * {
            box-sizing: border-box;
        }

        [hidden] {
            display: none !important;
        }

        body {
            margin: 0;
            min-height: 100vh;
            min-height: 100dvh;
            height: 100vh;
            height: 100dvh;
            padding: calc(18px + env(safe-area-inset-top)) calc(18px + env(safe-area-inset-right)) calc(18px + env(safe-area-inset-bottom)) calc(18px + env(safe-area-inset-left));
            display: grid;
            place-items: center;
            font-family: "Space Grotesk", "Aptos", "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(37, 99, 235, 0.18), transparent 34%),
                radial-gradient(circle at 90% 10%, rgba(56, 189, 248, 0.16), transparent 26%),
                linear-gradient(160deg, var(--bg-1), var(--bg-2));
            overflow-x: hidden;
            overflow-y: hidden;
            position: relative;
            user-select: none;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            border-radius: 999px;
            filter: blur(10px);
            pointer-events: none;
        }

        body::before {
            width: 340px;
            height: 340px;
            left: -110px;
            bottom: -120px;
            background: rgba(37, 99, 235, 0.12);
        }

        body::after {
            width: 260px;
            height: 260px;
            right: -80px;
            top: 8%;
            background: rgba(56, 189, 248, 0.14);
        }

        .chat-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            width: min(1180px, 100%);
            height: min(920px, calc(100vh - 36px));
            height: min(920px, calc(100dvh - 36px - env(safe-area-inset-top) - env(safe-area-inset-bottom)));
            min-height: 0;
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid var(--panel-border);
            background: var(--panel);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: var(--shadow);
        }

        .chat-container::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: linear-gradient(120deg, rgba(255, 255, 255, 0.22), transparent 48%, rgba(56, 189, 248, 0.16));
            opacity: 0;
            transition: opacity var(--motion-slow) var(--ease-out-soft);
        }

        html.theme-switching .chat-container::after {
            opacity: 0.58;
        }

        html.theme-switching body,
        html.theme-switching .chat-container,
        html.theme-switching .content-shell,
        html.theme-switching .lobby-card,
        html.theme-switching .composer-wrap,
        html.theme-switching .jump-latest-btn,
        html.theme-switching .input-wrap::before,
        html.theme-switching #messages li {
            transition: color var(--motion-slow) var(--ease-out-soft), background var(--motion-slow) var(--ease-out-soft), border-color var(--motion-slow) var(--ease-out-soft), box-shadow var(--motion-slow) var(--ease-out-soft);
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 18px;
            padding: 22px 28px;
            background:
                linear-gradient(135deg, rgba(18, 32, 51, 0.96), rgba(37, 99, 235, 0.92)),
                linear-gradient(135deg, #1d4ed8, #38bdf8);
            color: #fff;
        }

        .topbar-main {
            display: flex;
            align-items: center;
            gap: 16px;
            min-width: 0;
        }

        .brand-mark {
            width: 52px;
            height: 52px;
            border-radius: 18px;
            display: grid;
            place-items: center;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 0.04em;
            background: rgba(255, 255, 255, 0.16);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18);
        }

        .title-stack {
            min-width: 0;
            flex: 1;
        }

        .title-stack h2 {
            margin: 0;
            font-size: 26px;
            letter-spacing: -0.03em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .title-sub {
            margin-top: 6px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.82);
        }

        .header-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            max-width: 100%;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.14);
            white-space: nowrap;
        }

        .header-chip strong {
            color: #fff;
        }

        .connection-chip::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--warning);
            box-shadow: 0 0 0 5px rgba(247, 144, 9, 0.14);
        }

        .connection-chip[data-tone="success"]::before {
            background: #34d399;
            box-shadow: 0 0 0 5px rgba(52, 211, 153, 0.16);
        }

        .connection-chip[data-tone="error"]::before {
            background: #f97066;
            box-shadow: 0 0 0 5px rgba(249, 112, 102, 0.14);
        }

        .connection-chip[data-tone="busy"]::before {
            background: #60a5fa;
            box-shadow: 0 0 0 5px rgba(96, 165, 250, 0.16);
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .theme-toggle,
        .leave-btn,
        .join-btn,
        .send-btn,
        .ghost-btn,
        .jump-latest-btn {
            position: relative;
            overflow: hidden;
            border: none;
            font: inherit;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transform: translateY(0) scale(1);
            will-change: transform, box-shadow;
            transition:
                transform var(--motion-fast) var(--ease-out-soft),
                box-shadow var(--motion-fast) var(--ease-out-soft),
                opacity var(--motion-snap) var(--ease-out-soft),
                border-color var(--motion-fast) var(--ease-out-soft),
                background var(--motion-fast) var(--ease-out-soft),
                color var(--motion-fast) var(--ease-out-soft),
                filter var(--motion-fast) var(--ease-out-soft);
        }

        .theme-toggle,
        .leave-btn {
            min-height: 48px;
            padding: 0 16px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            border: 1px solid var(--surface-border-strong);
        }

        .theme-toggle:hover:not(:disabled),
        .leave-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.24);
        }

        .content-shell {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.48), rgba(255, 255, 255, 0.24)),
                linear-gradient(120deg, rgba(37, 99, 235, 0.04), transparent 24%);
        }

        html[data-theme="dark"] .content-shell {
            background:
                linear-gradient(180deg, rgba(8, 21, 49, 0.92), rgba(6, 16, 38, 0.98)),
                linear-gradient(120deg, rgba(37, 99, 235, 0.1), transparent 30%);
        }

        .lobby-shell {
            flex: 1;
            min-height: 0;
            display: grid;
            place-items: center;
            padding: 28px;
            overflow-y: auto;
            overscroll-behavior: contain;
            -webkit-overflow-scrolling: touch;
        }

        .lobby-card {
            width: min(460px, 100%);
            padding: 32px;
            border-radius: 28px;
            background: var(--surface-soft);
            border: 1px solid var(--surface-border);
            box-shadow: 0 24px 48px rgba(15, 23, 42, 0.08);
        }

        .lobby-head {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: center;
            margin-bottom: 24px;
        }

        .lobby-head h3 {
            margin: 0;
            font-size: 22px;
            letter-spacing: -0.03em;
            color: var(--text-strong);
        }

        .lobby-head p {
            margin: 6px 0 0;
            color: var(--text-soft);
            font-size: 13px;
            line-height: 1.6;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            background: var(--surface);
            border: 1px solid var(--surface-border);
            color: var(--text-soft);
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
        }

        .status-pill::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--warning);
            box-shadow: 0 0 0 5px rgba(247, 144, 9, 0.12);
        }

        .status-pill[data-tone="success"]::before {
            background: var(--success);
            box-shadow: 0 0 0 5px rgba(3, 152, 85, 0.12);
        }

        .status-pill[data-tone="error"]::before {
            background: var(--danger);
            box-shadow: 0 0 0 5px rgba(217, 45, 32, 0.12);
        }

        .status-pill[data-tone="busy"]::before {
            background: var(--primary);
            box-shadow: 0 0 0 5px rgba(37, 99, 235, 0.12);
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .field-label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .field label {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-strong);
        }

        .counter {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-faint);
        }

        .input-wrap,
        .input-stack {
            position: relative;
        }

        .input-wrap::before {
            content: "@";
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--username-prefix-color);
            font-weight: 700;
            font-size: 18px;
            opacity: 0.98;
            z-index: 2;
            transition: color var(--motion-fast) var(--ease-out-soft), opacity var(--motion-fast) var(--ease-out-soft);
            pointer-events: none;
        }

        .input-wrap:focus-within::before {
            color: var(--username-prefix-color);
            opacity: 0.98;
        }

        input {
            width: 100%;
            border-radius: 18px;
            border: 1px solid var(--surface-border);
            background: var(--surface-strong);
            color: var(--text);
            font: inherit;
            transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
            user-select: text;
        }

        input:hover {
            border-color: rgba(37, 99, 235, 0.24);
        }

        input:focus {
            outline: none;
            border-color: rgba(37, 99, 235, 0.56);
            box-shadow: 0 0 0 5px rgba(37, 99, 235, 0.12);
            transform: translateY(-1px);
        }

        #usernameInput {
            position: relative;
            z-index: 1;
            padding: 16px 18px 16px 42px;
            font-size: 15px;
        }

        .join-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .join-btn,
        .send-btn {
            min-height: 54px;
            padding: 0 20px;
            border-radius: 18px;
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, var(--primary), #3b82f6);
            box-shadow: 0 20px 35px rgba(37, 99, 235, 0.24);
        }

        .join-btn:hover:not(:disabled),
        .send-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 24px 42px rgba(37, 99, 235, 0.28);
        }

        .theme-toggle:focus-visible,
        .leave-btn:focus-visible,
        .join-btn:focus-visible,
        .send-btn:focus-visible,
        .ghost-btn:focus-visible,
        .jump-latest-btn:focus-visible {
            outline: none;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.14);
        }

        .theme-toggle:active:not(:disabled),
        .leave-btn:active:not(:disabled),
        .join-btn:active:not(:disabled),
        .send-btn:active:not(:disabled),
        .ghost-btn:active:not(:disabled),
        .jump-latest-btn:active:not(:disabled),
        .theme-toggle.is-pressed,
        .leave-btn.is-pressed,
        .join-btn.is-pressed,
        .send-btn.is-pressed,
        .ghost-btn.is-pressed,
        .jump-latest-btn.is-pressed {
            transform: translateY(0) scale(0.975);
            filter: saturate(0.98);
        }

        .theme-toggle:active:not(:disabled),
        .leave-btn:active:not(:disabled),
        .theme-toggle.is-pressed,
        .leave-btn.is-pressed,
        .ghost-btn:active:not(:disabled),
        .ghost-btn.is-pressed,
        .jump-latest-btn:active:not(:disabled),
        .jump-latest-btn.is-pressed {
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
        }

        .join-btn:active:not(:disabled),
        .send-btn:active:not(:disabled),
        .join-btn.is-pressed,
        .send-btn.is-pressed {
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.2);
        }

        .join-btn:disabled,
        .send-btn:disabled,
        .ghost-btn:disabled,
        .theme-toggle:disabled,
        .leave-btn:disabled {
            cursor: not-allowed;
            opacity: 0.55;
            box-shadow: none;
        }

        .status-card,
        .error-card {
            margin-top: 16px;
            min-height: 52px;
            display: flex;
            align-items: center;
            padding: 14px 16px;
            border-radius: 18px;
            font-size: 13px;
            line-height: 1.6;
        }

        .status-card {
            background: var(--primary-soft);
            color: var(--primary-strong);
            border: 1px solid rgba(37, 99, 235, 0.12);
        }

        .status-card[data-tone="success"] {
            background: var(--success-soft);
            color: var(--success);
            border-color: rgba(3, 152, 85, 0.12);
        }

        .status-card[data-tone="error"] {
            background: var(--danger-soft);
            color: var(--danger);
            border-color: rgba(217, 45, 32, 0.12);
        }

        .error-card {
            background: var(--danger-soft);
            color: var(--danger);
            border: 1px solid rgba(217, 45, 32, 0.12);
        }

        .error-card:empty {
            display: none;
        }

        .chat-panel {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .messages-shell {
            flex: 1;
            min-height: 0;
            display: flex;
            overflow: hidden;
            padding: 20px 22px 0;
            position: relative;
        }

        html[data-theme="dark"] .messages-shell {
            background: linear-gradient(180deg, rgba(11, 30, 69, 0.4), rgba(11, 30, 69, 0));
        }

        #messages {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            list-style: none;
            margin: 0;
            padding: 6px 8px max(22px, env(safe-area-inset-bottom));
            overflow-y: auto;
            gap: 14px;
            scroll-behavior: smooth;
            overscroll-behavior: contain;
            -webkit-overflow-scrolling: touch;
            scrollbar-gutter: stable;
        }

        #messages li {
            position: relative;
            max-width: min(72%, 640px);
            padding: 14px 16px;
            border-radius: 20px;
            word-break: break-word;
            font-size: 14px;
            line-height: 1.65;
            box-shadow: 0 12px 24px rgba(15, 23, 42, 0.06);
            border: 1px solid transparent;
            transform-origin: bottom center;
            will-change: transform, opacity, filter;
            animation: message-incoming var(--motion-normal) var(--ease-out-soft);
        }

        #messages li.message-incoming {
            animation-name: message-incoming;
        }

        #messages li.message-outgoing {
            animation-name: message-outgoing;
        }

        #messages li.message-notice {
            animation-name: message-notice;
        }

        #messages li.motion-done {
            will-change: auto;
        }

        @keyframes message-incoming {
            from {
                opacity: 0;
                transform: translate3d(0, 14px, 0) scale(0.985);
            }
            to {
                opacity: 1;
                transform: translate3d(0, 0, 0) scale(1);
            }
        }

        @keyframes message-outgoing {
            from {
                opacity: 0;
                transform: translate3d(10px, 12px, 0) scale(0.97);
            }
            70% {
                transform: translate3d(0, -1px, 0) scale(1.01);
            }
            to {
                opacity: 1;
                transform: translate3d(0, 0, 0) scale(1);
            }
        }

        @keyframes message-notice {
            from {
                opacity: 0;
                transform: translate3d(0, 10px, 0) scale(0.98);
                filter: blur(1px);
            }
            to {
                opacity: 1;
                transform: translate3d(0, 0, 0) scale(1);
                filter: blur(0);
            }
        }

        #messages li .message-head {
            display: flex;
            justify-content: space-between;
            align-items: start;
            gap: 12px;
        }

        #messages li .message-meta {
            min-width: 0;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        #messages li .message-author {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-strong);
        }

        #messages li .message-channel {
            display: inline-flex;
            align-items: center;
            min-height: 24px;
            padding: 0 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            background: var(--tag-neutral-bg);
            color: var(--tag-neutral-text);
        }

        #messages li .message-time {
            flex-shrink: 0;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-faint);
        }

        #messages li .message-context {
            margin-top: 4px;
            font-size: 12px;
            color: var(--text-soft);
        }

        #messages li .message-body {
            margin-top: 10px;
            white-space: pre-wrap;
            color: var(--text);
        }

        #messages li.system,
        #messages li.error {
            max-width: 82%;
            align-self: center;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: none;
            border-radius: 999px;
            padding: 9px 14px;
            font-size: 12px;
            font-weight: 700;
        }

        #messages li .notice-badge {
            display: inline-flex;
            align-items: center;
            min-height: 24px;
            padding: 0 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            background: var(--notice-badge-bg);
        }

        #messages li .notice-text {
            line-height: 1.5;
        }

        #messages li .notice-time {
            font-size: 11px;
            font-weight: 800;
            color: var(--text-soft);
        }

        #messages li.system {
            background: rgba(37, 99, 235, 0.1);
            color: var(--primary-strong);
            border-color: rgba(37, 99, 235, 0.12);

</div>

    const serverMessageKeyMap = {
        "Type error": "server.typeError",
        "Illegal username": "server.illegalUsername",
        "User already exists.": "server.userExists",
        "User deletion failed.": "server.userDeletionFailed",
        "User does not exist.": "server.userMissing",
        "User identity verification failed.": "server.identityFailed",
        "Do not send empty messages": "server.emptyMessage"
    };

    function t(path, vars) {
        const segments = path.split(".");
        let value = I18N[currentLang];
        for (let index = 0; index < segments.length; index++) {
            if (!value) {
                return path;
            }
            value = value[segments[index]];
        }
        if (typeof value !== "string") {
            return path;
        }
        if (!vars) {
            return value;
        }
        return value.replace(/\{(\w+)\}/g, function (_, key) {
            return vars[key] == null ? "" : String(vars[key]);
        });
    }

    function setLanguage(lang) {
        currentLang = lang === "zh" ? "zh" : "en";
        localStorage.setItem("kichatLang", currentLang);
        applyLanguage();
    }

    function localized(key, vars) {
        return {
            key: key,
            vars: vars || null
        };
    }

    function applyLocalizedText(el, value) {
        if (!el) {
            return;
        }

        if (!value) {
            delete el.dataset.i18nKey;
            delete el.dataset.i18nVars;
            el.textContent = "";
            return;
        }

        if (typeof value === "object" && value.key) {
            el.dataset.i18nKey = value.key;
            el.dataset.i18nVars = value.vars ? JSON.stringify(value.vars) : "";
            el.textContent = t(value.key, value.vars);
            return;
        }

        delete el.dataset.i18nKey;
        delete el.dataset.i18nVars;
        el.textContent = String(value);
    }

    function refreshLocalizedText(el) {
        if (!el || !el.dataset.i18nKey) {
            return;
        }

        let vars = null;
        if (el.dataset.i18nVars) {
            try {
                vars = JSON.parse(el.dataset.i18nVars);
            } catch (error) {
                vars = null;
            }
        }
        el.textContent = t(el.dataset.i18nKey, vars);
    }

    function localizeServerMessage(content) {
        const key = serverMessageKeyMap[content || ""];
        if (key) {
            return localized(key);
        }
        return content || t("error.unknown");
    }

    function updateLeaveButton() {
        leaveBtn.disabled = leaving;
        leaveBtn.textContent = leaving ? t("button.leaving") : t("button.leave");
    }

    function setButtonPressed(button, pressed) {
        if (!button || button.disabled) {
            return;
        }
        button.classList.toggle("is-pressed", pressed);
    }

    function bindButtonPressFeedback(button) {
        if (!button) {
            return;
        }

        button.addEventListener("pointerdown", function () {
            setButtonPressed(button, true);
        });
        button.addEventListener("pointerup", function () {
            setButtonPressed(button, false);
        });
        button.addEventListener("pointerleave", function () {
            setButtonPressed(button, false);
        });
        button.addEventListener("pointercancel", function () {
            setButtonPressed(button, false);
        });
        button.addEventListener("blur", function () {
            setButtonPressed(button, false);

    function playThemeTransition() {
        if (reducedMotionMedia.matches) {
            return;
        }
        document.documentElement.classList.add("theme-switching");
        clearTimeout(themeTransitionTimer);
        themeTransitionTimer = setTimeout(function () {
            document.documentElement.classList.remove("theme-switching");
        }, 460);
    }

    function applyTheme(theme) {
        if (theme === getCurrentTheme()) {
            return;
        }

        playThemeTransition();
        const commitTheme = function () {
            document.documentElement.setAttribute("data-theme", theme);
            localStorage.setItem("kichatTheme", theme);
            updateThemeToggle();
        };

        if (typeof document.startViewTransition === "function" && !reducedMotionMedia.matches) {
            document.startViewTransition(function () {
                commitTheme();
            });
            return;
        }

        commitTheme();
    }

    function stopAnimations(element) {
        if (!element || typeof element.getAnimations !== "function") {
            return;
        }
        element.getAnimations().forEach(function (animation) {
            animation.cancel();
        });
    }

    function animatePanelSwitch(panelIn, panelOut, nextView) {
        if (!panelIn || !panelOut) {
            return;
        }

        if (reducedMotionMedia.matches) {
            panelIn.hidden = false;
            panelOut.hidden = true;
            return;
        }

        stopAnimations(panelIn);
        stopAnimations(panelOut);
        panelIn.hidden = false;
        if (panelOut.hidden) {
            return;
        }

        const enteringChat = nextView === "chat";
        const inFrames = enteringChat
            ? [
                { opacity: 0, transform: "translateY(22px) scale(0.975)", filter: "blur(10px)" },
                { opacity: 1, transform: "translateY(0) scale(1)", filter: "blur(0px)" }
            ]
            : [
                { opacity: 0, transform: "translateY(-18px) scale(1.012)", filter: "blur(8px)" },
                { opacity: 1, transform: "translateY(0) scale(1)", filter: "blur(0px)" }
            ];
        const outFrames = enteringChat
            ? [
                { opacity: 1, transform: "translateY(0) scale(1)", filter: "blur(0px)" },
                { opacity: 0, transform: "translateY(-20px) scale(0.97)", filter: "blur(8px)" }
            ]
            : [
                { opacity: 1, transform: "translateY(0) scale(1)", filter: "blur(0px)" },
                { opacity: 0, transform: "translateY(18px) scale(0.985)", filter: "blur(10px)" }
            ];

        panelIn.style.pointerEvents = "none";
        panelOut.style.pointerEvents = "none";
        const inAnimation = panelIn.animate(inFrames, {
            duration: enteringChat ? 420 : 360,
            easing: "cubic-bezier(0.22, 1, 0.36, 1)",
            fill: "both"
        });

        const outAnimation = panelOut.animate(outFrames, {
            duration: enteringChat ? 260 : 280,
            easing: "cubic-bezier(0.4, 0, 1, 1)",
            fill: "both"
        });

        const accentTarget = panelIn.querySelector(enteringChat ? ".composer-wrap" : ".lobby-card");
        if (accentTarget) {
            stopAnimations(accentTarget);
            accentTarget.animate([
                { opacity: 0, transform: enteringChat ? "translateY(16px)" : "translateY(-12px)" },
                { opacity: 1, transform: "translateY(0)" }
            ], {
                duration: enteringChat ? 440 : 380,
                delay: enteringChat ? 70 : 40,
                easing: "cubic-bezier(0.22, 1, 0.36, 1)",
                fill: "both"
            });
        }

        inAnimation.addEventListener("finish", function () {
            panelIn.style.pointerEvents = "";
            panelIn.style.opacity = "";
            panelIn.style.transform = "";
            panelIn.style.filter = "";
        });

        outAnimation.addEventListener("finish", function () {
            panelOut.hidden = true;
            panelOut.style.pointerEvents = "";
            panelOut.style.opacity = "";
            panelOut.style.transform = "";
            panelOut.style.filter = "";
        });
    }

    function playJoinMotion() {
        if (reducedMotionMedia.matches) {
            return;

        if (chatContainerEl) {
            chatContainerEl.animate([
                { transform: "translateY(0) scale(1)", boxShadow: "var(--shadow)" },

    function formatDisplayTime(rawTime, includeSeconds) {
        const now = new Date();
        const options = {
            hour: "2-digit",
            minute: "2-digit",
            hour12: false
        };

        if (includeSeconds) {
            options.second = "2-digit";
        }

        if (!rawTime) {
            return new Intl.DateTimeFormat(currentLang === "zh" ? "zh-HK" : "en-GB", options).format(now);
        }

        if (/^\d{1,2}:\d{2}(:\d{2})?$/.test(rawTime)) {
            const parts = rawTime.split(":");
            if (includeSeconds && parts.length === 2) {
                return rawTime + ":00";
            }
            if (!includeSeconds && parts.length >= 2) {
                return parts[0].padStart(2, "0") + ":" + parts[1];
            }
            return rawTime;
        }

        const parsed = new Date(rawTime);
        if (!isNaN(parsed.getTime())) {
            return new Intl.DateTimeFormat(currentLang === "zh" ? "zh-HK" : "en-GB", options).format(parsed);
        }

        return rawTime;
    }

    function isNearMessagesBottom() {
        const threshold = 56;
        const distanceToBottom = messagesEl.scrollHeight - messagesEl.clientHeight - messagesEl.scrollTop;
        return distanceToBottom <= threshold;
    }

    function scrollMessagesToBottom(behavior) {
        const useSmooth = behavior === "smooth" && !reducedMotionMedia.matches;
        messagesEl.scrollTo({
            top: messagesEl.scrollHeight,
            behavior: useSmooth ? "smooth" : "auto"
        });
    }

    function updateJumpLatestButton() {
        jumpLatestBtn.hidden = incomingSinceDetached <= 0;

            ? t("message.newMany", { count: incomingSinceDetached })
            : t("message.newOne");
    }

    function clearDetachedCounter() {

    function appendMessage(messageView, cssClass) {
        const view = typeof messageView === "string"
            ? {
                kind: "notice",
                cssClass: cssClass || "system",
                badge: cssClass === "error" ? t("message.noticeError") : t("message.noticeSystem"),
                body: messageView,
                time: formatDisplayTime("", true)
            }
            : messageView;
        const isOutgoingMessage = view.cssClass === "public-out" || view.cssClass === "private-out";
        const shouldStickToBottom = isNearMessagesBottom();
        const now = Date.now();
        const item = document.createElement("li");
        if (view.cssClass) {
            item.classList.add(view.cssClass);
        }

        if (view.kind === "notice") {
            item.classList.add("message-notice");
            if (!reducedMotionMedia.matches) {
                item.style.animationDuration = "220ms";
            }
        } else {
            item.classList.add(isOutgoingMessage ? "message-outgoing" : "message-incoming");
            if (!reducedMotionMedia.matches) {
                if (isOutgoingMessage) {
                    const burstGapOut = now - lastOutgoingMessageAt;
                    const burstDelayOut = burstGapOut < 220 ? Math.min(70, Math.max(16, 220 - burstGapOut)) : 0;
                    item.style.animationDuration = "260ms";
                    item.style.animationDelay = burstDelayOut + "ms";
                    lastOutgoingMessageAt = now;
                } else {
                    const burstGapIn = now - lastIncomingMessageAt;
                    const burstDelayIn = burstGapIn < 220 ? Math.min(90, Math.max(18, 220 - burstGapIn)) : 0;
                    item.style.animationDuration = "340ms";
                    item.style.animationDelay = burstDelayIn + "ms";
                    lastIncomingMessageAt = now;
                }
            }
        }

        item.addEventListener("animationend", function () {
            item.classList.add("motion-done");
            item.style.animationDelay = "";
            item.style.animationDuration = "";
        }, { once: true });

        if (view.kind === "notice") {
            const badge = document.createElement("span");
            badge.className = "notice-badge";
            badge.textContent = view.badge;

            const text = document.createElement("span");
            text.className = "notice-text";
            text.textContent = view.body;

            const time = document.createElement("span");
            time.className = "notice-time";
            time.textContent = view.time;

            item.appendChild(badge);
            item.appendChild(text);
            item.appendChild(time);
        } else {
            const head = document.createElement("div");
            head.className = "message-head";

            const meta = document.createElement("div");
            meta.className = "message-meta";

            const author = document.createElement("span");
            author.className = "message-author";
            author.textContent = view.author;

            const channel = document.createElement("span");
            channel.className = "message-channel";
            channel.textContent = view.channel;

            const time = document.createElement("span");
            time.className = "message-time";
            time.textContent = view.time;

            meta.appendChild(author);
            meta.appendChild(channel);
            head.appendChild(meta);
            head.appendChild(time);
            item.appendChild(head);

            if (view.context) {
                const context = document.createElement("div");
                context.className = "message-context";
                context.textContent = view.context;
                item.appendChild(context);
            }

            const body = document.createElement("div");
            body.className = "message-body";
            body.textContent = view.body;
            item.appendChild(body);
        }

        messagesEl.appendChild(item);
        if (shouldStickToBottom || isOutgoingMessage) {
            scrollMessagesToBottom(isOutgoingMessage ? "smooth" : "auto");
            clearDetachedCounter();
            return;
        }

        incomingSinceDetached++;
        updateJumpLatestButton();
    }

    function formatMessage(message, channel) {
        if (message.type === "JOIN" || message.type === "LEAVE") {
            return {
                kind: "notice",
                cssClass: "system",
                badge: message.type === "JOIN" ? t("message.noticeJoin") : t("message.noticeLeave"),
                body: message.sender
                    ? t(message.type === "JOIN" ? "message.joinedRoom" : "message.leftRoom", { user: message.sender })
                    : (message.content || t("message.noticeSystem")),
                time: formatDisplayTime(message.time, true)
            };
        }

        if (message.type === "ERROR") {
            const errorMessage = localizeServerMessage(message.content);
            return {
                kind: "notice",
                cssClass: "error",
                badge: t("message.noticeError"),
                body: typeof errorMessage === "string"
                    ? errorMessage
                    : t(errorMessage.key, errorMessage.vars),
                time: formatDisplayTime(message.time, true)
            };
        }

        if (channel === "private") {
            const sender = message.sender || t("message.unknown");
            const receiver = message.receiver || t("message.unknown");
            const isOutgoing = sender === currentUsername;
            return {
                kind: "chat",
                cssClass: isOutgoing ? "private-out" : "private-in",
                author: isOutgoing ? t("message.you") : sender,
                channel: t("message.channelPrivate"),
                context: isOutgoing ? t("message.toUser", { user: receiver }) : t("message.toYou"),
                time: formatDisplayTime(message.time, false),
                body: message.content || ""
            };
        }

        const sender = message.sender || t("message.unknown");
        const isOutgoing = sender === currentUsername;
        return {
            kind: "chat",
            cssClass: isOutgoing ? "public-out" : "public",
            author: isOutgoing ? t("message.you") : sender,
            channel: t("message.channelPublic"),
            context: null,
            time: formatDisplayTime(message.time, false),
            body: message.content || ""
        };
    }

    function parseUsers(content) {
        if (!content) {
            return [];
        }
        const users = [];
        const pattern = /\[([^\]]+)\]/g;
        let match = pattern.exec(content);
        while (match) {
            users.push(match[1]);
            match = pattern.exec(content);
        }
        return users;
    }

    function parseDirectPrivateInput(rawText) {
        const match = rawText.match(/^@([^\s@]+)\s+(.+)$/);
        if (!match) {
            return null;
        }
        return {
            receiver: match[1],
            content: match[2].trim()
        };
    }

    function requestOnlineUsers(force) {
        if (!stompClient || !stompClient.connected || !hasJoined || !currentUsername) {
            return;
        }
        const now = Date.now();
        if (!force && now - lastQueryAt < 1000) {
            return;
        }
        lastQueryAt = now;
        stompClient.publish({
            destination: "/Kichat/queryAll",
            body: JSON.stringify({
                type: "QUERY",
                sender: currentUsername
            })
        });
    }

    function closeMentionList() {
        mentionOpen = false;
        mentionListEl.hidden = true;
        mentionListEl.innerHTML = "";
    }

    function renderMentionList() {
        mentionCandidates = onlineUsers.filter(function (user) {
            return user !== currentUsername && user.toLowerCase().indexOf(mentionKeyword.toLowerCase()) === 0;
        });

        if (!mentionCandidates.length) {
            closeMentionList();
            return;
        }

        if (mentionActiveIndex >= mentionCandidates.length) {
            mentionActiveIndex = 0;
        }
        if (mentionActiveIndex < 0) {
            mentionActiveIndex = mentionCandidates.length - 1;
        }

        mentionListEl.innerHTML = "";
        mentionCandidates.forEach(function (candidate, index) {
            const item = document.createElement("li");
            item.textContent = candidate;
            if (index === mentionActiveIndex) {
                item.classList.add("active");
            }
            item.addEventListener("mousedown", function (event) {
                event.preventDefault();
                selectMention(candidate);
            });
            mentionListEl.appendChild(item);
        });

        mentionOpen = true;
        mentionListEl.hidden = false;
    }

    function syncMentionFromInput() {
        const cursor = messageInput.selectionStart == null ? messageInput.value.length : messageInput.selectionStart;
        const textBeforeCursor = messageInput.value.slice(0, cursor);
        const atIndex = textBeforeCursor.lastIndexOf("@");
        if (atIndex < 0) {
            closeMentionList();
            return;
        }
        const keyword = textBeforeCursor.slice(atIndex + 1);
        if (keyword.indexOf(" ") >= 0) {
            closeMentionList();
            return;
        }
        mentionAnchorIndex = atIndex;
        mentionKeyword = keyword;
        mentionActiveIndex = 0;
        if (onlineUsers.length === 0) {
            requestOnlineUsers(true);
        }
        renderMentionList();
    }

    function hasActiveMentionTrigger() {
        const cursor = messageInput.selectionStart == null ? messageInput.value.length : messageInput.selectionStart;
        const textBeforeCursor = messageInput.value.slice(0, cursor);
        const atIndex = textBeforeCursor.lastIndexOf("@");
        if (atIndex < 0) {
            return false;
        }
        const keyword = textBeforeCursor.slice(atIndex + 1);
        return keyword.indexOf(" ") < 0;
    }

    function selectMention(user) {
        const cursor = messageInput.selectionStart == null ? messageInput.value.length : messageInput.selectionStart;
        const prefix = messageInput.value.slice(0, mentionAnchorIndex);
        const suffix = messageInput.value.slice(cursor);
        const mentionText = "@" + user + " ";
        messageInput.value = prefix + mentionText + suffix;
        const nextCursor = (prefix + mentionText).length;
        messageInput.focus();
        messageInput.setSelectionRange(nextCursor, nextCursor);
        setPrivateTarget(user);
        updateMessageCounter();
        closeMentionList();
        updateComposerState();
    }

    function resetChatUi() {
        messagesEl.innerHTML = "";
        messageInput.value = "";
        closeMentionList();

        onlineUsers = [];

    function enterRoom(username) {

    function returnToLobby(message, tone, keepName) {
        const previousName = keepName || currentUsername || usernameInput.value.trim();
        hasJoined = false;
        isJoining = false;
        leaving = false;
        currentUsername = "";
        pendingUsername = "";
        clearJoinTimeout();
        sessionStorage.removeItem("kichatUsername");

        updateUsernameUi();
        setPrivateTarget("");
        setLobbyPill(isConnected ? localized("state.connected") : localized("state.offline"), isConnected ? "success" : "error");
        setJoinStatus(message, tone);

        showLobby();

    function connect() {
        if (stompClient && (stompClient.active || stompClient.connected)) {
            return;
        }

        setConnectionState(localized("state.connecting"), "busy");
        setLobbyPill(localized("state.connecting"), "busy");
        setJoinStatus(localized("status.connectingServer"), "busy");
        updateJoinButton();

        stompClient = new StompJs.Client({
            brokerURL: getWebSocketUrl(),
            reconnectDelay: 0,
            debug: function () {}
        });

        stompClient.onConnect = function () {
            isConnected = true;
            setConnectionState(hasJoined ? localized("state.connected") : localized("state.ready"), hasJoined ? "success" : "busy");
            setLobbyPill(hasJoined ? localized("state.inRoom") : localized("state.connected"), "success");
            if (!hasJoined) {
                setJoinStatus(localized("status.connectedEnter"), "success");
            }
            updateJoinButton();
            updateComposerState();
            if (!hasJoined) {
                usernameInput.focus();
            }

            stompClient.subscribe("/topic/public", function (frame) {
                const message = JSON.parse(frame.body);
                const isPendingSelfJoin = !hasJoined && isJoining && message.type === "JOIN" && message.sender === pendingUsername;
                if (isPendingSelfJoin) {
                    enterRoom(message.sender);
                }
                if (!hasJoined) {
                    return;
                }
                appendMessage(formatMessage(message, "public"));
                if (message.type === "JOIN" || message.type === "LEAVE") {
                    requestOnlineUsers(true);
                }
            });

            stompClient.subscribe("/user/queue/private", function (frame) {
                if (!hasJoined) {
                    return;
                }
                appendMessage(formatMessage(JSON.parse(frame.body), "private"));
            });

            stompClient.subscribe("/user/queue/error", function (frame) {
                const message = JSON.parse(frame.body);
                clearJoinTimeout();
                if (!hasJoined) {
                    isJoining = false;
                    setLobbyPill(localized("state.connected"), "success");
                    setJoinStatus(localized("status.retryUsername"), "error");
                    setJoinError(message.content ? localizeServerMessage(message.content) : localized("error.joinFailed"));
                    updateJoinButton();
                    return;
                }
                appendMessage(formatMessage(message, "error"));
            });

            stompClient.subscribe("/user/queue/queryAll", function (frame) {
                if (!hasJoined) {
                    return;
                }
                const message = JSON.parse(frame.body);
                onlineUsers = parseUsers(message.content);
                updateOnlineCount();
                if (privateTarget && onlineUsers.indexOf(privateTarget) < 0) {
                    appendMessage(t("message.privateOffline", { user: privateTarget }), "system");
                    setPrivateTarget("");
                }
                if (hasActiveMentionTrigger()) {
                    syncMentionFromInput();
                } else if (mentionOpen) {
                    closeMentionList();
                }
            });
        };

        stompClient.onWebSocketError = function () {
            isConnected = false;
            clearJoinTimeout();
            updateJoinButton();
            updateComposerState();
            setConnectionState(localized("state.offline"), "error");
            setLobbyPill(localized("state.offline"), "error");
            if (hasJoined) {
                returnToLobby(localized("status.lostRejoin"), "error", currentUsername);
                setJoinError(localized("error.wsFailed"));
                return;
            }
            setJoinStatus(localized("status.failedConnect"), "error");
            setJoinError(localized("error.wsFailed"));
        };

        stompClient.onStompError = function () {
            isConnected = false;
            clearJoinTimeout();
            updateJoinButton();
            updateComposerState();
            setConnectionState(localized("state.error"), "error");
            setLobbyPill(localized("state.error"), "error");
            if (hasJoined) {
                returnToLobby(localized("status.errorRejoin"), "error", currentUsername);
                setJoinError(localized("error.stompError"));
                return;
            }
            setJoinStatus(localized("status.connectionError"), "error");
            setJoinError(localized("error.stompError"));
        };

        stompClient.activate();
    }

    function sendJoin() {
        if (!stompClient || !stompClient.connected) {
            setJoinError(localized("error.notConnected"));
            return;
        }

        const username = usernameInput.value.trim();
        if (!username) {
            setJoinError(localized("error.usernameEmpty"));
            updateJoinButton();
            return;
        }

        pendingUsername = username;
        isJoining = true;
        setJoinError("");
        setLobbyPill(localized("state.joining"), "busy");
        setJoinStatus(localized("status.joining"), "busy");
        updateJoinButton();

        clearJoinTimeout();
        joinTimeoutHandle = setTimeout(function () {
            isJoining = false;
            setLobbyPill(localized("state.connected"), "success");
            setJoinStatus(localized("status.joinTimeout"), "error");
            setJoinError(localized("error.noJoinResponse"));
            updateJoinButton();
        }, 6000);

        stompClient.publish({
            destination: "/Kichat/join",
            body: JSON.stringify({
                type: "JOIN",
                sender: username
            })
        });
    }

    function sendMessage() {
        if (!stompClient || !stompClient.connected || !hasJoined || !currentUsername) {
            appendMessage(t("error.notConnected"), "error");
            return;
        }

        if (sendLocked) {
            return;
        }

        const rawContent = messageInput.value.trim();
        if (!rawContent) {
            updateComposerState();
            return;
        }

        const directPrivate = parseDirectPrivateInput(rawContent);
        let receiver = privateTarget;
        let content = rawContent;

        if (!receiver && directPrivate) {
            receiver = directPrivate.receiver;
            content = directPrivate.content;
            setPrivateTarget(receiver);
        }

        if (receiver && onlineUsers.length > 0 && onlineUsers.indexOf(receiver) < 0) {
            appendMessage(t("message.privateOfflineSimple"), "system");
            setPrivateTarget("");
            receiver = "";
            content = rawContent;
        }

        if (receiver) {
            stompClient.publish({
                destination: "/Kichat/private",
                body: JSON.stringify({
                    type: "PRIVATE",
                    sender: currentUsername,
                    receiver: receiver,
                    content: content
                })
            });
        } else {
            stompClient.publish({
                destination: "/Kichat/chat",
                body: JSON.stringify({
                    type: "CHAT",
                    sender: currentUsername,
                    content: content
                })
            });
        }

        sendLocked = true;
        updateComposerState();
        setTimeout(function () {
            sendLocked = false;
            updateComposerState();
        }, 220);

        messageInput.value = "";
        updateMessageCounter();
        closeMentionList();
        updateComposerState();
        messageInput.focus();
    }

    function leaveRoom() {
        if (leaving || !hasJoined) {
            return;
        }

        const confirmed = window.confirm(t("dialog.leaveConfirm"));
        if (!confirmed) {
            return;
        }

        leaving = true;
        updateLeaveButton();
        const username = currentUsername;

        if (stompClient && stompClient.connected) {
            stompClient.publish({
                destination: "/Kichat/leave",
                body: JSON.stringify({
                    type: "LEAVE",
                    sender: username
                })
            });
        }

        setTimeout(function () {
            Promise.resolve(stompClient ? stompClient.deactivate() : null).finally(function () {
                stompClient = null;
                isConnected = false;
                setConnectionState(localized("state.connecting"), "busy");
                returnToLobby(localized("status.leaveSuccess"), "success", username);
                connect();
            });
        }, 120);
    }

    joinBtn.addEventListener("click", sendJoin);
    langToggleEl.addEventListener("click", function () {
        setLanguage(currentLang === "zh" ? "en" : "zh");
    });
    themeToggleEl.addEventListener("click", function () {
        applyTheme(getCurrentTheme() === "dark" ? "light" : "dark");
    });

    usernameInput.addEventListener("input", updateUsernameUi);
    usernameInput.addEventListener("keydown", function (event) {
        if (event.isComposing || event.keyCode === 229) {
            return;
        }
        if (event.key === "Enter" && !joinBtn.disabled) {
            sendJoin();
        }
    });

    sendBtn.addEventListener("click", sendMessage);
    messageInput.addEventListener("keydown", function (event) {
        if (event.isComposing || event.keyCode === 229) {
            return;
        }

        if (mentionOpen) {
            if (event.key === "ArrowDown") {
                event.preventDefault();
                mentionActiveIndex++;
                renderMentionList();
                return;
            }
            if (event.key === "ArrowUp") {
                event.preventDefault();
                mentionActiveIndex--;
                renderMentionList();
                return;
            }
            if (event.key === "Enter" || event.key === "Tab") {
                event.preventDefault();
                selectMention(mentionCandidates[mentionActiveIndex]);
                return;
            }
            if (event.key === "Escape") {
                event.preventDefault();
                closeMentionList();
                return;
            }
        }

        if (event.key === "Enter") {
            sendMessage();
        }
    });

    messageInput.addEventListener("input", function () {
        updateMessageCounter();
        syncMentionFromInput();
        updateComposerState();
    });

    messageInput.addEventListener("focus", function () {
        requestOnlineUsers(false);
    });

    clearPrivateBtn.addEventListener("click", function () {
        setPrivateTarget("");
        closeMentionList();
        updateComposerState();
        messageInput.focus();
    });

    document.addEventListener("click", function (event) {
        if (!mentionListEl.contains(event.target) && event.target !== messageInput) {
            closeMentionList();
        }
    });

    messagesEl.addEventListener("scroll", function () {
        if (isNearMessagesBottom()) {
            clearDetachedCounter();
        }
    });

    jumpLatestBtn.addEventListener("click", function () {
        scrollMessagesToBottom("smooth");
        clearDetachedCounter();
    });

    leaveBtn.addEventListener("click", leaveRoom);

    [
        langToggleEl,
        themeToggleEl,
        leaveBtn,
        joinBtn,
        jumpLatestBtn,
        clearPrivateBtn,
        sendBtn
    ].forEach(bindButtonPressFeedback);

    updateMessageCounter();
    updateOnlineCount();
    updateUsernameUi();
    applyLanguage();
    showLobby(true);

    const savedUsername = sessionStorage.getItem("kichatUsername");
    if (savedUsername) {
        usernameInput.value = savedUsername;
        updateUsernameUi();
    }

    connect();
</script>
</body>
</html>
