<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kichat - Join</title>
    <script>
        (function () {
            const savedTheme = localStorage.getItem("kichatTheme");
            const theme = savedTheme === "light" || savedTheme === "dark"
                ? savedTheme
                : (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
            document.documentElement.setAttribute("data-theme", theme);
        })();
    </script>
    <style>
        :root {
            color-scheme: light;
            --bg-1: #edf3ff;
            --bg-2: #f8fbff;
            --panel: rgba(255, 255, 255, 0.84);
            --panel-border: rgba(255, 255, 255, 0.72);
            --surface: rgba(255, 255, 255, 0.92);
            --surface-strong: rgba(255, 255, 255, 0.97);
            --surface-soft: rgba(255, 255, 255, 0.76);
            --surface-border: rgba(148, 163, 184, 0.2);
            --surface-border-strong: rgba(255, 255, 255, 0.2);
            --text: #122033;
            --text-strong: #0f172a;
            --text-soft: #64748b;
            --text-faint: #94a3b8;
            --primary: #2563eb;
            --primary-strong: #1d4ed8;
            --primary-soft: rgba(37, 99, 235, 0.12);
            --accent-soft: rgba(56, 189, 248, 0.12);
            --success: #039855;
            --success-soft: rgba(3, 152, 85, 0.12);
            --danger: #d92d20;
            --danger-soft: rgba(217, 45, 32, 0.1);
            --warning: #f79009;
            --line: rgba(148, 163, 184, 0.22);
            --shadow: 0 30px 80px rgba(37, 65, 120, 0.18);
            --notice-badge-bg: rgba(255, 255, 255, 0.58);
            --button-soft-bg: rgba(255, 255, 255, 0.86);
            --button-soft-text: #334155;
            --tag-neutral-bg: rgba(15, 23, 42, 0.06);
            --tag-neutral-text: #475569;
        }

        html[data-theme="dark"] {
            color-scheme: dark;
            --bg-1: #08111f;
            --bg-2: #0f1b31;
            --panel: rgba(8, 14, 25, 0.84);
            --panel-border: rgba(148, 163, 184, 0.14);
            --surface: rgba(10, 29, 68, 0.92);
            --surface-strong: rgba(8, 22, 52, 0.98);
            --surface-soft: rgba(8, 21, 49, 0.84);
            --surface-border: rgba(148, 163, 184, 0.14);
            --surface-border-strong: rgba(148, 163, 184, 0.18);
            --text: #e5eefc;
            --text-strong: #f8fbff;
            --text-soft: #a4b6d4;
            --text-faint: #7f93b2;
            --primary-soft: rgba(59, 130, 246, 0.18);
            --accent-soft: rgba(56, 189, 248, 0.18);
            --success-soft: rgba(3, 152, 85, 0.16);
            --danger-soft: rgba(217, 45, 32, 0.16);
            --line: rgba(148, 163, 184, 0.18);
            --shadow: 0 30px 80px rgba(0, 0, 0, 0.46);
            --notice-badge-bg: rgba(148, 163, 184, 0.14);
            --button-soft-bg: rgba(9, 25, 58, 0.92);
            --button-soft-text: #e5eefc;
            --tag-neutral-bg: rgba(37, 99, 235, 0.18);
            --tag-neutral-text: #c3d1e8;
        }

        * {
            box-sizing: border-box;
        }

        [hidden] {
            display: none !important;
        }

        body {
            margin: 0;
            min-height: 100vh;
            min-height: 100dvh;
            padding: calc(18px + env(safe-area-inset-top)) calc(18px + env(safe-area-inset-right)) calc(18px + env(safe-area-inset-bottom)) calc(18px + env(safe-area-inset-left));
            display: grid;
            place-items: center;
            font-family: "Space Grotesk", "Aptos", "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(37, 99, 235, 0.18), transparent 34%),
                radial-gradient(circle at 90% 10%, rgba(56, 189, 248, 0.16), transparent 26%),
                linear-gradient(160deg, var(--bg-1), var(--bg-2));
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            user-select: none;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            border-radius: 999px;
            filter: blur(10px);
            pointer-events: none;
        }

        body::before {
            width: 340px;
            height: 340px;
            left: -110px;
            bottom: -120px;
            background: rgba(37, 99, 235, 0.12);
        }

        body::after {
            width: 260px;
            height: 260px;
            right: -80px;
            top: 8%;
            background: rgba(56, 189, 248, 0.14);
        }

        .chat-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            width: min(1180px, 100%);
            min-height: min(920px, calc(100vh - 36px));
            min-height: min(920px, calc(100dvh - 36px - env(safe-area-inset-top) - env(safe-area-inset-bottom)));
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid var(--panel-border);
            background: var(--panel);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: var(--shadow);
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 18px;
            padding: 22px 28px;
            background:
                linear-gradient(135deg, rgba(18, 32, 51, 0.96), rgba(37, 99, 235, 0.92)),
                linear-gradient(135deg, #1d4ed8, #38bdf8);
            color: #fff;
        }

        .topbar-main {
            display: flex;
            align-items: center;
            gap: 16px;
            min-width: 0;
        }

        .brand-mark {
            width: 52px;
            height: 52px;
            border-radius: 18px;
            display: grid;
            place-items: center;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 0.04em;
            background: rgba(255, 255, 255, 0.16);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18);
        }

        .title-stack {
            min-width: 0;
            flex: 1;
        }

        .title-stack h2 {
            margin: 0;
            font-size: 26px;
            letter-spacing: -0.03em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .title-sub {
            margin-top: 6px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.82);
        }

        .header-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            max-width: 100%;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.14);
            white-space: nowrap;
        }

        .header-chip strong {
            color: #fff;
        }

        .connection-chip::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--warning);
            box-shadow: 0 0 0 5px rgba(247, 144, 9, 0.14);
        }

        .connection-chip[data-tone="success"]::before {
            background: #34d399;
            box-shadow: 0 0 0 5px rgba(52, 211, 153, 0.16);
        }

        .connection-chip[data-tone="error"]::before {
            background: #f97066;
            box-shadow: 0 0 0 5px rgba(249, 112, 102, 0.14);
        }

        .connection-chip[data-tone="busy"]::before {
            background: #60a5fa;
            box-shadow: 0 0 0 5px rgba(96, 165, 250, 0.16);
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .theme-toggle,
        .leave-btn,
        .join-btn,
        .send-btn,
        .ghost-btn {
            border: none;
            font: inherit;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease, border-color 0.18s ease, background 0.18s ease;
        }

        .theme-toggle,
        .leave-btn {
            min-height: 48px;
            padding: 0 16px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            border: 1px solid var(--surface-border-strong);
        }

        .theme-toggle:hover,
        .leave-btn:hover {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.24);
        }

        .content-shell {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.48), rgba(255, 255, 255, 0.24)),
                linear-gradient(120deg, rgba(37, 99, 235, 0.04), transparent 24%);
        }

        html[data-theme="dark"] .content-shell {
            background:
                linear-gradient(180deg, rgba(8, 21, 49, 0.92), rgba(6, 16, 38, 0.98)),
                linear-gradient(120deg, rgba(37, 99, 235, 0.1), transparent 30%);
        }

        .lobby-shell {
            flex: 1;
            display: grid;
            place-items: center;
            padding: 28px;
        }

        .lobby-card {
            width: min(460px, 100%);
            padding: 32px;
            border-radius: 28px;
            background: var(--surface-soft);
            border: 1px solid var(--surface-border);
            box-shadow: 0 24px 48px rgba(15, 23, 42, 0.08);
        }

        .lobby-head {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: center;
            margin-bottom: 24px;
        }

        .lobby-head h3 {
            margin: 0;
            font-size: 22px;
            letter-spacing: -0.03em;
            color: var(--text-strong);
        }

        .lobby-head p {
            margin: 6px 0 0;
            color: var(--text-soft);
            font-size: 13px;
            line-height: 1.6;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            background: var(--surface);
            border: 1px solid var(--surface-border);
            color: var(--text-soft);
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
        }

        .status-pill::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--warning);
            box-shadow: 0 0 0 5px rgba(247, 144, 9, 0.12);
        }

        .status-pill[data-tone="success"]::before {
            background: var(--success);
            box-shadow: 0 0 0 5px rgba(3, 152, 85, 0.12);
        }

        .status-pill[data-tone="error"]::before {
            background: var(--danger);
            box-shadow: 0 0 0 5px rgba(217, 45, 32, 0.12);
        }

        .status-pill[data-tone="busy"]::before {
            background: var(--primary);
            box-shadow: 0 0 0 5px rgba(37, 99, 235, 0.12);
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .field-label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .field label {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-strong);
        }

        .counter {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-faint);
        }

        .input-wrap,
        .input-stack {
            position: relative;
        }

        .input-wrap::before {
            content: "@";
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-faint);
            font-weight: 700;
            font-size: 18px;
            pointer-events: none;
        }

        input {
            width: 100%;
            border-radius: 18px;
            border: 1px solid var(--surface-border);
            background: var(--surface-strong);
            color: var(--text);
            font: inherit;
            transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
            user-select: text;
        }

        input:hover {
            border-color: rgba(37, 99, 235, 0.24);
        }

        input:focus {
            outline: none;
            border-color: rgba(37, 99, 235, 0.56);
            box-shadow: 0 0 0 5px rgba(37, 99, 235, 0.12);
            transform: translateY(-1px);
        }

        #usernameInput {
            padding: 16px 18px 16px 42px;
            font-size: 15px;
        }

        .join-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .join-btn,
        .send-btn {
            min-height: 54px;
            padding: 0 20px;
            border-radius: 18px;
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, var(--primary), #3b82f6);
            box-shadow: 0 20px 35px rgba(37, 99, 235, 0.24);
        }

        .join-btn:hover:not(:disabled),
        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 24px 42px rgba(37, 99, 235, 0.28);
        }

        .join-btn:disabled,
        .send-btn:disabled,
        .ghost-btn:disabled,
        .theme-toggle:disabled,
        .leave-btn:disabled {
            cursor: not-allowed;
            opacity: 0.55;
            box-shadow: none;
        }

        .status-card,
        .error-card {
            margin-top: 16px;
            min-height: 52px;
            display: flex;
            align-items: center;
            padding: 14px 16px;
            border-radius: 18px;
            font-size: 13px;
            line-height: 1.6;
        }

        .status-card {
            background: var(--primary-soft);
            color: var(--primary-strong);
            border: 1px solid rgba(37, 99, 235, 0.12);
        }

        .status-card[data-tone="success"] {
            background: var(--success-soft);
            color: var(--success);
            border-color: rgba(3, 152, 85, 0.12);
        }

        .status-card[data-tone="error"] {
            background: var(--danger-soft);
            color: var(--danger);
            border-color: rgba(217, 45, 32, 0.12);
        }

        .error-card {
            background: var(--danger-soft);
            color: var(--danger);
            border: 1px solid rgba(217, 45, 32, 0.12);
        }

        .error-card:empty {
            display: none;
        }

        .chat-panel {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        .messages-shell {
            flex: 1;
            min-height: 0;
            display: flex;
            overflow: hidden;
            padding: 20px 22px 0;
        }

        html[data-theme="dark"] .messages-shell {
            background: linear-gradient(180deg, rgba(11, 30, 69, 0.4), rgba(11, 30, 69, 0));
        }

        #messages {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            list-style: none;
            margin: 0;
            padding: 6px 8px 22px;
            overflow-y: auto;
            gap: 14px;
            scroll-behavior: smooth;
        }

        #messages li {
            position: relative;
            max-width: min(72%, 640px);
            padding: 14px 16px;
            border-radius: 20px;
            word-break: break-word;
            font-size: 14px;
            line-height: 1.65;
            box-shadow: 0 12px 24px rgba(15, 23, 42, 0.06);
            border: 1px solid transparent;
            animation: message-in 0.2s ease;
        }

        @keyframes message-in {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #messages li .message-head {
            display: flex;
            justify-content: space-between;
            align-items: start;
            gap: 12px;
        }

        #messages li .message-meta {
            min-width: 0;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        #messages li .message-author {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-strong);
        }

        #messages li .message-channel {
            display: inline-flex;
            align-items: center;
            min-height: 24px;
            padding: 0 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            background: var(--tag-neutral-bg);
            color: var(--tag-neutral-text);
        }

        #messages li .message-time {
            flex-shrink: 0;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-faint);
        }

        #messages li .message-context {
            margin-top: 4px;
            font-size: 12px;
            color: var(--text-soft);
        }

        #messages li .message-body {
            margin-top: 10px;
            white-space: pre-wrap;
            color: var(--text);
        }

        #messages li.system,
        #messages li.error {
            max-width: 82%;
            align-self: center;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: none;
            border-radius: 999px;
            padding: 9px 14px;
            font-size: 12px;
            font-weight: 700;
        }

        #messages li .notice-badge {
            display: inline-flex;
            align-items: center;
            min-height: 24px;
            padding: 0 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            background: var(--notice-badge-bg);
        }

        #messages li .notice-text {
            line-height: 1.5;
        }

        #messages li .notice-time {
            font-size: 11px;
            font-weight: 800;
            color: var(--text-soft);
        }

        #messages li.system {
            background: rgba(37, 99, 235, 0.1);
            color: var(--primary-strong);
            border-color: rgba(37, 99, 235, 0.12);
        }

        #messages li.error {
            background: rgba(217, 45, 32, 0.1);
            color: var(--danger);
            border-color: rgba(217, 45, 32, 0.14);
        }

        #messages li.public {
            align-self: flex-start;
            background: var(--surface);
            border-color: var(--surface-border);
            border-bottom-left-radius: 8px;
        }

        #messages li.public-out {
            align-self: flex-end;
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.16), rgba(56, 189, 248, 0.12));
            border-color: rgba(37, 99, 235, 0.16);
            border-bottom-right-radius: 8px;
        }

        #messages li.private-in {
            align-self: flex-start;
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.16);
            border-bottom-left-radius: 8px;
        }

        #messages li.private-out {
            align-self: flex-end;
            background: rgba(245, 158, 11, 0.12);
            border-color: rgba(245, 158, 11, 0.18);
            border-bottom-right-radius: 8px;
        }

        .composer-wrap {
            flex-shrink: 0;
            position: relative;
            margin: 0 22px 22px;
            padding: 18px;
            border-radius: 24px;
            background: var(--surface-soft);
            border: 1px solid var(--surface-border);
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.06);
        }

        .mode-bar {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: center;
            margin-bottom: 14px;
        }

        .mode-left {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .mode-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            max-width: 100%;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(15, 23, 42, 0.04);
            border: 1px solid var(--surface-border);
            font-size: 12px;
            font-weight: 700;
            color: var(--button-soft-text);
        }

        .mode-pill::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-faint);
        }

        .mode-pill.mode-private {
            background: rgba(37, 99, 235, 0.12);
            border-color: rgba(37, 99, 235, 0.16);
            color: var(--primary-strong);
        }

        .mode-pill.mode-private::before {
            background: var(--primary);
        }

        .ghost-btn {
            min-height: 38px;
            padding: 0 12px;
            border-radius: 12px;
            background: var(--button-soft-bg);
            color: var(--button-soft-text);
            border: 1px solid var(--surface-border);
            font-size: 12px;
            font-weight: 700;
        }

        .ghost-btn:hover:not(:disabled) {
            background: rgba(37, 99, 235, 0.04);
            border-color: rgba(37, 99, 235, 0.18);
        }

        .composer {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 12px;
            align-items: center;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        #messageInput {
            min-height: 56px;
            padding: 16px 18px;
            font-size: 15px;
        }

        .composer-meta {
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            color: var(--text-soft);
            font-size: 12px;
            font-weight: 700;
        }

        .mention-list {
            position: absolute;
            left: 18px;
            right: 118px;
            bottom: calc(100% + 12px);
            margin: 0;
            padding: 8px;
            list-style: none;
            border-radius: 18px;
            border: 1px solid var(--surface-border);
            background: var(--surface-strong);
            box-shadow: 0 18px 36px rgba(15, 23, 42, 0.12);
            max-height: 240px;
            overflow-y: auto;
            z-index: 3;
        }

        .mention-list li {
            padding: 10px 12px;
            border-radius: 12px;
            color: var(--text);
            cursor: pointer;
        }

        .mention-list li:hover,
        .mention-list li.active {
            background: var(--primary-soft);
            color: var(--primary-strong);
        }

        @media (max-width: 820px) {
            body {
                padding: calc(14px + env(safe-area-inset-top)) calc(14px + env(safe-area-inset-right)) calc(14px + env(safe-area-inset-bottom)) calc(14px + env(safe-area-inset-left));
            }

            .chat-container {
                min-height: calc(100dvh - 28px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
                border-radius: 24px;
            }

            .topbar {
                flex-direction: column;
                align-items: stretch;
                padding: 18px;
            }

            .topbar-actions {
                justify-content: flex-end;
            }

            .lobby-shell {
                padding: 18px;
            }

            .lobby-card {
                padding: 24px;
                border-radius: 24px;
            }
        }

        @media (max-width: 620px) {
            .messages-shell {
                padding: 16px 14px 0;
            }

            .composer-wrap {
                margin: 0 14px 14px;
                padding: 14px;
            }

            .composer {
                grid-template-columns: 1fr;
            }

            .send-btn {
                width: 100%;
            }

            .mention-list {
                left: 12px;
                right: 12px;
                bottom: calc(100% + 10px);
                max-height: min(220px, 42dvh);
            }
        }

        @media (max-width: 520px) {
            .lobby-head {
                flex-direction: column;
                align-items: start;
            }

            .join-actions {
                flex-direction: column;
            }

            #messages li {
                max-width: 88%;
            }

            .theme-toggle,
            .leave-btn {
                min-height: 44px;
            }
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="topbar">
        <div class="topbar-main">
            <div class="brand-mark">KI</div>
            <div class="title-stack">
                <h2 id="roomTitle">Kichat Lobby</h2>
                <div class="title-sub">
                    <span id="connectionState" class="header-chip connection-chip" data-tone="busy">Connecting</span>
                    <span class="header-chip">User <strong id="usernameBadge">guest</strong></span>
                    <span class="header-chip">Online <strong id="onlineCountHeader">0</strong></span>
                </div>
            </div>
        </div>
        <div class="topbar-actions">
            <button id="themeToggle" class="theme-toggle" type="button">Dark mode</button>
            <button id="leaveBtn" class="leave-btn" type="button" hidden>Leave</button>
        </div>
    </div>

    <div class="content-shell">
        <section id="lobbyShell" class="lobby-shell">
            <div class="lobby-card">
                <div class="lobby-head">
                    <div>
                        <h3>Join the room</h3>
                        <p>Stay on this page after joining so the same WebSocket session handles both join and chat.</p>
                    </div>
                    <div id="lobbyPill" class="status-pill" data-tone="busy">Connecting</div>
                </div>

                <div class="field">
                    <div class="field-label-row">
                        <label for="usernameInput">Username</label>
                        <span id="usernameCounter" class="counter">0 / 30</span>
                    </div>
                    <div class="input-wrap">
                        <input id="usernameInput" type="text" maxlength="30" autocomplete="nickname" placeholder="Choose a display name">
                    </div>
                </div>

                <div class="join-actions">
                    <button id="joinBtn" class="join-btn" type="button" disabled>Waiting for Server</button>
                </div>

                <div id="joinStatus" class="status-card" data-tone="busy">Connecting to chat server...</div>
                <div id="joinError" class="error-card"></div>
            </div>
        </section>

        <section id="chatPanel" class="chat-panel" hidden>
            <div class="messages-shell">
                <ul id="messages"></ul>
            </div>

            <div class="composer-wrap">
                <div class="mode-bar">
                    <div class="mode-left">
                        <span id="modeLabel" class="mode-pill">Public</span>
                    </div>
                    <button id="clearPrivateBtn" class="ghost-btn" type="button" hidden>Back to Public</button>
                </div>
                <div class="composer">
                    <div class="input-stack">
                        <label class="sr-only" for="messageInput">Message</label>
                        <input id="messageInput" type="text" maxlength="500" placeholder="Message">
                    </div>
                    <button id="sendBtn" class="send-btn" type="button" disabled>Send</button>
                </div>
                <div class="composer-meta">
                    <span><strong id="messageCounter">0</strong> / 500</span>
                </div>
                <ul id="mentionList" class="mention-list" hidden></ul>
            </div>
        </section>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
<script>
    const roomTitle = document.getElementById("roomTitle");
    const usernameBadge = document.getElementById("usernameBadge");
    const onlineCountHeaderEl = document.getElementById("onlineCountHeader");
    const connectionStateEl = document.getElementById("connectionState");
    const themeToggleEl = document.getElementById("themeToggle");
    const leaveBtn = document.getElementById("leaveBtn");
    const lobbyShell = document.getElementById("lobbyShell");
    const lobbyPill = document.getElementById("lobbyPill");
    const usernameInput = document.getElementById("usernameInput");
    const usernameCounterEl = document.getElementById("usernameCounter");
    const joinBtn = document.getElementById("joinBtn");
    const joinStatusEl = document.getElementById("joinStatus");
    const joinErrorEl = document.getElementById("joinError");
    const chatPanel = document.getElementById("chatPanel");
    const messagesEl = document.getElementById("messages");
    const modeLabel = document.getElementById("modeLabel");
    const clearPrivateBtn = document.getElementById("clearPrivateBtn");
    const messageInput = document.getElementById("messageInput");
    const messageCounterEl = document.getElementById("messageCounter");
    const sendBtn = document.getElementById("sendBtn");
    const mentionListEl = document.getElementById("mentionList");

    let stompClient = null;
    let currentUsername = "";
    let pendingUsername = "";
    let isConnected = false;
    let hasJoined = false;
    let isJoining = false;
    let leaving = false;
    let joinTimeoutHandle = null;
    let privateTarget = "";
    let onlineUsers = [];
    let mentionCandidates = [];
    let mentionOpen = false;
    let mentionKeyword = "";
    let mentionAnchorIndex = -1;
    let mentionActiveIndex = 0;
    let lastQueryAt = 0;

    function getCurrentTheme() {
        return document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light";
    }

    function updateThemeToggle() {
        const currentTheme = getCurrentTheme();
        themeToggleEl.textContent = currentTheme === "dark" ? "Light mode" : "Dark mode";
        themeToggleEl.setAttribute("aria-label", currentTheme === "dark" ? "Switch to light mode" : "Switch to dark mode");
    }

    function applyTheme(theme) {
        document.documentElement.setAttribute("data-theme", theme);
        localStorage.setItem("kichatTheme", theme);
        updateThemeToggle();
    }

    function getWebSocketUrl() {
        const wsProtocol = window.location.protocol === "https:" ? "wss" : "ws";
        return wsProtocol + "://" + window.location.host + "/ws-chat";
    }

    function updateHeader() {
        const displayUser = currentUsername || "guest";
        roomTitle.textContent = currentUsername ? "Kichat - " + currentUsername : "Kichat Lobby";
        document.title = currentUsername ? "Kichat - " + currentUsername : "Kichat - Join";
        usernameBadge.textContent = displayUser;
    }

    function setConnectionState(text, tone) {
        connectionStateEl.textContent = text;
        connectionStateEl.dataset.tone = tone;
    }

    function setLobbyPill(text, tone) {
        lobbyPill.textContent = text;
        lobbyPill.dataset.tone = tone;
    }

    function setJoinStatus(text, tone) {
        joinStatusEl.textContent = text;
        joinStatusEl.dataset.tone = tone;
    }

    function setJoinError(text) {
        joinErrorEl.textContent = text;
    }

    function clearJoinTimeout() {
        if (joinTimeoutHandle) {
            clearTimeout(joinTimeoutHandle);
            joinTimeoutHandle = null;
        }
    }

    function updateUsernameUi() {
        usernameCounterEl.textContent = usernameInput.value.length + " / 30";
        updateJoinButton();
    }

    function updateJoinButton() {
        const hasUsernameValue = usernameInput.value.trim().length > 0;
        joinBtn.disabled = !isConnected || isJoining || hasJoined || !hasUsernameValue;
        if (hasJoined) {
            joinBtn.textContent = "Joined";
            return;
        }
        if (isJoining) {
            joinBtn.textContent = "Joining...";
            return;
        }
        joinBtn.textContent = isConnected ? "Join Room" : "Waiting for Server";
    }

    function updateMessageCounter() {
        messageCounterEl.textContent = messageInput.value.length;
    }

    function updateOnlineCount() {
        onlineCountHeaderEl.textContent = onlineUsers.length;
    }

    function updateComposerState() {
        const hasContent = messageInput.value.trim().length > 0;
        sendBtn.disabled = !isConnected || !hasJoined || !hasContent;
        messageInput.disabled = !isConnected || !hasJoined;
        if (privateTarget) {
            messageInput.placeholder = "Message @" + privateTarget;
            return;
        }
        messageInput.placeholder = "Message";
    }

    function updateModeUi() {
        if (privateTarget) {
            modeLabel.textContent = "Private · @" + privateTarget;
            modeLabel.classList.add("mode-private");
            clearPrivateBtn.hidden = false;
        } else {
            modeLabel.textContent = "Public";
            modeLabel.classList.remove("mode-private");
            clearPrivateBtn.hidden = true;
        }
        updateComposerState();
    }

    function setPrivateTarget(target) {
        privateTarget = target || "";
        updateModeUi();
    }

    function showLobby() {
        lobbyShell.hidden = false;
        chatPanel.hidden = true;
        leaveBtn.hidden = true;
        updateJoinButton();
    }

    function showChat() {
        lobbyShell.hidden = true;
        chatPanel.hidden = false;
        leaveBtn.hidden = false;
        updateComposerState();
    }

    function formatDisplayTime(rawTime, includeSeconds) {
        const now = new Date();
        const options = {
            hour: "2-digit",
            minute: "2-digit",
            hour12: false
        };

        if (includeSeconds) {
            options.second = "2-digit";
        }

        if (!rawTime) {
            return new Intl.DateTimeFormat("en-GB", options).format(now);
        }

        if (/^\d{1,2}:\d{2}(:\d{2})?$/.test(rawTime)) {
            const parts = rawTime.split(":");
            if (includeSeconds && parts.length === 2) {
                return rawTime + ":00";
            }
            if (!includeSeconds && parts.length >= 2) {
                return parts[0].padStart(2, "0") + ":" + parts[1];
            }
            return rawTime;
        }

        const parsed = new Date(rawTime);
        if (!isNaN(parsed.getTime())) {
            return new Intl.DateTimeFormat("en-GB", options).format(parsed);
        }

        return rawTime;
    }

    function appendMessage(messageView, cssClass) {
        const view = typeof messageView === "string"
            ? {
                kind: "notice",
                cssClass: cssClass || "system",
                badge: cssClass === "error" ? "Error" : "System",
                body: messageView,
                time: formatDisplayTime("", true)
            }
            : messageView;
        const item = document.createElement("li");
        if (view.cssClass) {
            item.classList.add(view.cssClass);
        }

        if (view.kind === "notice") {
            const badge = document.createElement("span");
            badge.className = "notice-badge";
            badge.textContent = view.badge;

            const text = document.createElement("span");
            text.className = "notice-text";
            text.textContent = view.body;

            const time = document.createElement("span");
            time.className = "notice-time";
            time.textContent = view.time;

            item.appendChild(badge);
            item.appendChild(text);
            item.appendChild(time);
        } else {
            const head = document.createElement("div");
            head.className = "message-head";

            const meta = document.createElement("div");
            meta.className = "message-meta";

            const author = document.createElement("span");
            author.className = "message-author";
            author.textContent = view.author;

            const channel = document.createElement("span");
            channel.className = "message-channel";
            channel.textContent = view.channel;

            const time = document.createElement("span");
            time.className = "message-time";
            time.textContent = view.time;

            meta.appendChild(author);
            meta.appendChild(channel);
            head.appendChild(meta);
            head.appendChild(time);
            item.appendChild(head);

            if (view.context) {
                const context = document.createElement("div");
                context.className = "message-context";
                context.textContent = view.context;
                item.appendChild(context);
            }

            const body = document.createElement("div");
            body.className = "message-body";
            body.textContent = view.body;
            item.appendChild(body);
        }

        messagesEl.appendChild(item);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function formatMessage(message, channel) {
        if (message.type === "JOIN" || message.type === "LEAVE") {
            return {
                kind: "notice",
                cssClass: "system",
                badge: message.type === "JOIN" ? "Joined" : "Left",
                body: message.content || "System message",
                time: formatDisplayTime(message.time, true)
            };
        }

        if (message.type === "ERROR") {
            return {
                kind: "notice",
                cssClass: "error",
                badge: "Error",
                body: message.content || "Unknown error",
                time: formatDisplayTime(message.time, true)
            };
        }

        if (channel === "private") {
            const sender = message.sender || "Unknown";
            const receiver = message.receiver || "Unknown";
            const isOutgoing = sender === currentUsername;
            return {
                kind: "chat",
                cssClass: isOutgoing ? "private-out" : "private-in",
                author: isOutgoing ? "You" : sender,
                channel: "Private",
                context: isOutgoing ? "To @" + receiver : "To you",
                time: formatDisplayTime(message.time, false),
                body: message.content || ""
            };
        }

        const sender = message.sender || "Unknown";
        const isOutgoing = sender === currentUsername;
        return {
            kind: "chat",
            cssClass: isOutgoing ? "public-out" : "public",
            author: isOutgoing ? "You" : sender,
            channel: "Public",
            context: null,
            time: formatDisplayTime(message.time, false),
            body: message.content || ""
        };
    }

    function parseUsers(content) {
        if (!content) {
            return [];
        }
        const users = [];
        const pattern = /\[([^\]]+)\]/g;
        let match = pattern.exec(content);
        while (match) {
            users.push(match[1]);
            match = pattern.exec(content);
        }
        return users;
    }

    function parseDirectPrivateInput(rawText) {
        const match = rawText.match(/^@([^\s@]+)\s+(.+)$/);
        if (!match) {
            return null;
        }
        return {
            receiver: match[1],
            content: match[2].trim()
        };
    }

    function requestOnlineUsers(force) {
        if (!stompClient || !stompClient.connected || !hasJoined || !currentUsername) {
            return;
        }
        const now = Date.now();
        if (!force && now - lastQueryAt < 1000) {
            return;
        }
        lastQueryAt = now;
        stompClient.publish({
            destination: "/Kichat/queryAll",
            body: JSON.stringify({
                type: "QUERY",
                sender: currentUsername
            })
        });
    }

    function closeMentionList() {
        mentionOpen = false;
        mentionListEl.hidden = true;
        mentionListEl.innerHTML = "";
    }

    function renderMentionList() {
        mentionCandidates = onlineUsers.filter(function (user) {
            return user !== currentUsername && user.toLowerCase().indexOf(mentionKeyword.toLowerCase()) === 0;
        });

        if (!mentionCandidates.length) {
            closeMentionList();
            return;
        }

        if (mentionActiveIndex >= mentionCandidates.length) {
            mentionActiveIndex = 0;
        }
        if (mentionActiveIndex < 0) {
            mentionActiveIndex = mentionCandidates.length - 1;
        }

        mentionListEl.innerHTML = "";
        mentionCandidates.forEach(function (candidate, index) {
            const item = document.createElement("li");
            item.textContent = candidate;
            if (index === mentionActiveIndex) {
                item.classList.add("active");
            }
            item.addEventListener("mousedown", function (event) {
                event.preventDefault();
                selectMention(candidate);
            });
            mentionListEl.appendChild(item);
        });

        mentionOpen = true;
        mentionListEl.hidden = false;
    }

    function syncMentionFromInput() {
        const cursor = messageInput.selectionStart == null ? messageInput.value.length : messageInput.selectionStart;
        const textBeforeCursor = messageInput.value.slice(0, cursor);
        const atIndex = textBeforeCursor.lastIndexOf("@");
        if (atIndex < 0) {
            closeMentionList();
            return;
        }
        const keyword = textBeforeCursor.slice(atIndex + 1);
        if (keyword.indexOf(" ") >= 0) {
            closeMentionList();
            return;
        }
        mentionAnchorIndex = atIndex;
        mentionKeyword = keyword;
        mentionActiveIndex = 0;
        if (onlineUsers.length === 0) {
            requestOnlineUsers(true);
        }
        renderMentionList();
    }

    function hasActiveMentionTrigger() {
        const cursor = messageInput.selectionStart == null ? messageInput.value.length : messageInput.selectionStart;
        const textBeforeCursor = messageInput.value.slice(0, cursor);
        const atIndex = textBeforeCursor.lastIndexOf("@");
        if (atIndex < 0) {
            return false;
        }
        const keyword = textBeforeCursor.slice(atIndex + 1);
        return keyword.indexOf(" ") < 0;
    }

    function selectMention(user) {
        const cursor = messageInput.selectionStart == null ? messageInput.value.length : messageInput.selectionStart;
        const prefix = messageInput.value.slice(0, mentionAnchorIndex);
        const suffix = messageInput.value.slice(cursor);
        const mentionText = "@" + user + " ";
        messageInput.value = prefix + mentionText + suffix;
        const nextCursor = (prefix + mentionText).length;
        messageInput.focus();
        messageInput.setSelectionRange(nextCursor, nextCursor);
        setPrivateTarget(user);
        updateMessageCounter();
        closeMentionList();
        updateComposerState();
    }

    function resetChatUi() {
        messagesEl.innerHTML = "";
        messageInput.value = "";
        closeMentionList();
        setPrivateTarget("");
        onlineUsers = [];
        updateOnlineCount();
        updateMessageCounter();
        updateComposerState();
    }

    function enterRoom(username) {
        hasJoined = true;
        isJoining = false;
        leaving = false;
        currentUsername = username;
        pendingUsername = "";
        clearJoinTimeout();
        sessionStorage.setItem("kichatUsername", username);
        updateHeader();
        setConnectionState("Connected", "success");
        setLobbyPill("In Room", "success");
        setJoinStatus("Joined successfully. Chat is ready.", "success");
        setJoinError("");
        showChat();
        updateJoinButton();
        requestOnlineUsers(true);
        messageInput.focus();
    }

    function returnToLobby(message, tone, keepName) {
        const previousName = keepName || currentUsername || usernameInput.value.trim();
        hasJoined = false;
        isJoining = false;
        leaving = false;
        currentUsername = "";
        pendingUsername = "";
        clearJoinTimeout();
        sessionStorage.removeItem("kichatUsername");
        updateHeader();
        resetChatUi();
        if (previousName) {
            usernameInput.value = previousName;
        }
        updateUsernameUi();
        setPrivateTarget("");
        setLobbyPill(isConnected ? "Connected" : "Offline", isConnected ? "success" : "error");
        setJoinStatus(message, tone);
        setJoinError("");
        showLobby();
    }

    function connect() {
        if (stompClient && (stompClient.active || stompClient.connected)) {
            return;
        }

        setConnectionState("Connecting", "busy");
        setLobbyPill("Connecting", "busy");
        setJoinStatus("Connecting to chat server...", "busy");
        updateJoinButton();

        stompClient = new StompJs.Client({
            brokerURL: getWebSocketUrl(),
            reconnectDelay: 0,
            debug: function () {}
        });

        stompClient.onConnect = function () {
            isConnected = true;
            setConnectionState(hasJoined ? "Connected" : "Ready", hasJoined ? "success" : "busy");
            setLobbyPill(hasJoined ? "In Room" : "Connected", hasJoined ? "success" : "success");
            if (!hasJoined) {
                setJoinStatus("Connected. Enter a username to join.", "success");
            }
            updateJoinButton();
            updateComposerState();
            if (!hasJoined) {
                usernameInput.focus();
            }

            stompClient.subscribe("/topic/public", function (frame) {
                const message = JSON.parse(frame.body);
                const isPendingSelfJoin = !hasJoined && isJoining && message.type === "JOIN" && message.sender === pendingUsername;
                if (isPendingSelfJoin) {
                    enterRoom(message.sender);
                }
                if (!hasJoined) {
                    return;
                }
                appendMessage(formatMessage(message, "public"));
                if (message.type === "JOIN" || message.type === "LEAVE") {
                    requestOnlineUsers(true);
                }
            });

            stompClient.subscribe("/user/queue/private", function (frame) {
                if (!hasJoined) {
                    return;
                }
                appendMessage(formatMessage(JSON.parse(frame.body), "private"));
            });

            stompClient.subscribe("/user/queue/error", function (frame) {
                const message = JSON.parse(frame.body);
                clearJoinTimeout();
                if (!hasJoined) {
                    isJoining = false;
                    setLobbyPill("Connected", "success");
                    setJoinStatus("Connected. Please try another username.", "error");
                    setJoinError(message.content || "Join failed.");
                    updateJoinButton();
                    return;
                }
                appendMessage(formatMessage(message, "error"));
            });

            stompClient.subscribe("/user/queue/queryAll", function (frame) {
                if (!hasJoined) {
                    return;
                }
                const message = JSON.parse(frame.body);
                onlineUsers = parseUsers(message.content);
                updateOnlineCount();
                if (privateTarget && onlineUsers.indexOf(privateTarget) < 0) {
                    appendMessage("Private target " + privateTarget + " is now offline. Switched to public mode.", "system");
                    setPrivateTarget("");
                }
                if (hasActiveMentionTrigger()) {
                    syncMentionFromInput();
                } else if (mentionOpen) {
                    closeMentionList();
                }
            });
        };

        stompClient.onWebSocketError = function () {
            isConnected = false;
            clearJoinTimeout();
            updateJoinButton();
            updateComposerState();
            setConnectionState("Offline", "error");
            setLobbyPill("Offline", "error");
            if (hasJoined) {
                returnToLobby("Connection lost. Rejoin is required.", "error", currentUsername);
                setJoinError("WebSocket connection failed.");
                return;
            }
            setJoinStatus("Failed to connect. Refresh and retry.", "error");
            setJoinError("WebSocket connection failed.");
        };

        stompClient.onStompError = function () {
            isConnected = false;
            clearJoinTimeout();
            updateJoinButton();
            updateComposerState();
            setConnectionState("Error", "error");
            setLobbyPill("Error", "error");
            if (hasJoined) {
                returnToLobby("Connection error. Rejoin is required.", "error", currentUsername);
                setJoinError("STOMP error.");
                return;
            }
            setJoinStatus("Connection error. Refresh and retry.", "error");
            setJoinError("STOMP error.");
        };

        stompClient.activate();
    }

    function sendJoin() {
        if (!stompClient || !stompClient.connected) {
            setJoinError("Not connected to server.");
            return;
        }

        const username = usernameInput.value.trim();
        if (!username) {
            setJoinError("Username cannot be empty.");
            updateJoinButton();
            return;
        }

        pendingUsername = username;
        isJoining = true;
        setJoinError("");
        setLobbyPill("Joining", "busy");
        setJoinStatus("Joining...", "busy");
        updateJoinButton();

        clearJoinTimeout();
        joinTimeoutHandle = setTimeout(function () {
            isJoining = false;
            setLobbyPill("Connected", "success");
            setJoinStatus("Join response timeout. Please retry.", "error");
            setJoinError("No response received. Try a different username.");
            updateJoinButton();
        }, 6000);

        stompClient.publish({
            destination: "/Kichat/join",
            body: JSON.stringify({
                type: "JOIN",
                sender: username
            })
        });
    }

    function sendMessage() {
        if (!stompClient || !stompClient.connected || !hasJoined || !currentUsername) {
            appendMessage("Not connected to server.", "error");
            return;
        }

        const rawContent = messageInput.value.trim();
        if (!rawContent) {
            updateComposerState();
            return;
        }

        const directPrivate = parseDirectPrivateInput(rawContent);
        let receiver = privateTarget;
        let content = rawContent;

        if (!receiver && directPrivate) {
            receiver = directPrivate.receiver;
            content = directPrivate.content;
            setPrivateTarget(receiver);
        }

        if (receiver && onlineUsers.length > 0 && onlineUsers.indexOf(receiver) < 0) {
            appendMessage("Private target is offline. Switched to public mode.", "system");
            setPrivateTarget("");
            receiver = "";
            content = rawContent;
        }

        if (receiver) {
            stompClient.publish({
                destination: "/Kichat/private",
                body: JSON.stringify({
                    type: "PRIVATE",
                    sender: currentUsername,
                    receiver: receiver,
                    content: content
                })
            });
        } else {
            stompClient.publish({
                destination: "/Kichat/chat",
                body: JSON.stringify({
                    type: "CHAT",
                    sender: currentUsername,
                    content: content
                })
            });
        }

        messageInput.value = "";
        updateMessageCounter();
        closeMentionList();
        updateComposerState();
        messageInput.focus();
    }

    function leaveRoom() {
        if (leaving || !hasJoined) {
            return;
        }

        const confirmed = window.confirm("Are you sure you want to leave the room?");
        if (!confirmed) {
            return;
        }

        leaving = true;
        const username = currentUsername;

        if (stompClient && stompClient.connected) {
            stompClient.publish({
                destination: "/Kichat/leave",
                body: JSON.stringify({
                    type: "LEAVE",
                    sender: username
                })
            });
        }

        setTimeout(function () {
            Promise.resolve(stompClient ? stompClient.deactivate() : null).finally(function () {
                stompClient = null;
                isConnected = false;
                setConnectionState("Connecting", "busy");
                returnToLobby("You left the room. Join again when ready.", "success", username);
                connect();
            });
        }, 120);
    }

    joinBtn.addEventListener("click", sendJoin);
    themeToggleEl.addEventListener("click", function () {
        applyTheme(getCurrentTheme() === "dark" ? "light" : "dark");
    });

    usernameInput.addEventListener("input", updateUsernameUi);
    usernameInput.addEventListener("keydown", function (event) {
        if (event.key === "Enter" && !joinBtn.disabled) {
            sendJoin();
        }
    });

    sendBtn.addEventListener("click", sendMessage);
    messageInput.addEventListener("keydown", function (event) {
        if (mentionOpen) {
            if (event.key === "ArrowDown") {
                event.preventDefault();
                mentionActiveIndex++;
                renderMentionList();
                return;
            }
            if (event.key === "ArrowUp") {
                event.preventDefault();
                mentionActiveIndex--;
                renderMentionList();
                return;
            }
            if (event.key === "Enter" || event.key === "Tab") {
                event.preventDefault();
                selectMention(mentionCandidates[mentionActiveIndex]);
                return;
            }
            if (event.key === "Escape") {
                event.preventDefault();
                closeMentionList();
                return;
            }
        }

        if (event.key === "Enter") {
            sendMessage();
        }
    });

    messageInput.addEventListener("input", function () {
        updateMessageCounter();
        syncMentionFromInput();
        updateComposerState();
    });

    messageInput.addEventListener("focus", function () {
        requestOnlineUsers(false);
    });

    clearPrivateBtn.addEventListener("click", function () {
        setPrivateTarget("");
        closeMentionList();
        updateComposerState();
        messageInput.focus();
    });

    document.addEventListener("click", function (event) {
        if (!mentionListEl.contains(event.target) && event.target !== messageInput) {
            closeMentionList();
        }
    });

    leaveBtn.addEventListener("click", leaveRoom);

    updateThemeToggle();
    updateHeader();
    updateMessageCounter();
    updateOnlineCount();
    updateModeUi();
    updateUsernameUi();
    showLobby();

    const savedUsername = sessionStorage.getItem("kichatUsername");
    if (savedUsername) {
        usernameInput.value = savedUsername;
        updateUsernameUi();
    }

    connect();
</script>
</body>
</html>
